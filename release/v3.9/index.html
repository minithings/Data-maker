
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Database Game Maker v3.9 - Pro Workflow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg-main: #09090b; --bg-side: #09090b; --bg-panel: #121217; --bg-input: #000000; --accent: #3b82f6; --border: #27272a; --text-main: #f4f4f5; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); color: var(--text-main); overflow: hidden; letter-spacing: -0.01em; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        .g-table-row td { height: 58px; vertical-align: middle; border-bottom: 1px solid var(--border); }
        .g-input { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-main); padding: 0 12px; border-radius: 8px; font-size: 13px; outline: none; width: 100%; height: 38px; transition: all 0.2s; }
        .g-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1); }
        .input-error { border-color: #ef4444 !important; background-color: rgba(239, 68, 68, 0.05) !important; color: #f87171 !important; }
        .sidebar-active { background: rgba(59, 130, 246, 0.1); color: #60a5fa !important; }
        .data-panel { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 24px; overflow: hidden; }
        [x-cloak] { display: none !important; }
        .btn-action { font-size: 11px; padding: 6px 14px; border-radius: 8px; background: #18181b; border: 1px solid #27272a; color: #a1a1aa; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; font-weight: 600; }
        .btn-action:hover { background: #27272a; color: white; }
        .btn-primary { background: #2563eb; color: white; border: none; }
        .btn-primary:hover { background: #3b82f6; }
        .dirty-row { border-left: 3px solid #f59e0b !important; }
        .col-id { width: 220px; min-width: 220px; position: sticky; left: 0; z-index: 20; background: var(--bg-panel); border-right: 1px solid var(--border); }
        .shake-error { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-2px, 0, 0); } 40%, 60% { transform: translate3d(2px, 0, 0); } }
    </style>
</head>

<body x-data="editor()" @keydown.window.prevent.ctrl.s="saveDirtyFiles()" class="h-screen flex flex-col">

    <!-- LOADING OVERLAY -->
    <div x-show="isSaving" x-cloak class="fixed inset-0 bg-black/80 z-[200] flex flex-col items-center justify-center backdrop-blur-sm">
        <div class="w-10 h-10 border-2 border-white/20 border-t-white rounded-full animate-spin"></div>
        <p class="mt-4 text-[10px] font-bold uppercase tracking-widest text-zinc-400">Processing changes...</p>
    </div>

    <!-- NAVBAR -->
    <nav class="h-14 border-b border-zinc-800 bg-zinc-950 flex items-center justify-between px-4 z-30">
        <div class="flex items-center gap-4">
            <h1 class="text-xs font-bold uppercase tracking-tighter">Data Maker <span class="text-blue-500 font-black">V3.9</span></h1>
            <button @click="openProject()" class="btn-action"><i class="fa-solid fa-folder-open text-blue-500"></i> Open</button>
            <button @click="reloadProject()" class="btn-action" :disabled="!rootHandle" :class="!rootHandle && 'opacity-20'"><i class="fa-solid fa-rotate text-green-500"></i> Reload</button>
            <div class="h-4 w-[1px] bg-zinc-800 mx-1"></div>
            <button @click="exportAllData()" class="btn-action"><i class="fa-solid fa-file-export text-orange-400"></i> Export</button>
            <div class="flex items-center bg-zinc-900 rounded-lg p-0.5 border border-zinc-800">
                <button @click="importData()" class="btn-action !border-none !bg-transparent px-3" title="Import from File"><i class="fa-solid fa-file-import text-green-400"></i></button>
                <div class="w-[1px] h-3 bg-zinc-800"></div>
                <button @click="importModal.open = true" class="btn-action !border-none !bg-transparent px-3" title="Paste JSON string"><i class="fa-solid fa-paste text-blue-400"></i> Paste JSON</button>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <!-- CLICKABLE ERROR INDICATOR -->
            <button @click="errorSummary.open = true" class="text-[10px] font-bold text-red-500 bg-red-500/10 px-3 py-2 rounded-lg border border-red-500/20 hover:bg-red-500/20 transition-all" x-show="errorCount > 0">
                <i class="fa-solid fa-triangle-exclamation mr-1"></i> <span x-text="errorCount"></span> ISSUES FOUND
            </button>
            <input type="text" x-model="searchQuery" placeholder="Search everywhere..." class="g-input !w-64">
            <button @click="saveDirtyFiles()" :disabled="dirtyCount === 0 || errorCount > 0" :class="(dirtyCount > 0 && errorCount === 0) ? 'btn-primary' : 'opacity-30'" class="btn-action px-8 uppercase tracking-widest transition-all shadow-lg">
                Sync (<span x-text="dirtyCount"></span>)
            </button>
        </div>
    </nav>

    <div class="flex-1 flex overflow-hidden">
        <!-- SIDEBAR -->
        <aside class="w-64 bg-zinc-950 flex flex-col border-r border-zinc-900 shrink-0">
            <div class="p-4">
                <button @click="openCreateModal()" class="btn-action btn-primary w-full justify-center"><i class="fa-solid fa-plus-circle"></i> New Resource</button>
            </div>
            <div class="flex-1 overflow-y-auto custom-scrollbar">
                <template x-for="folder in folders" :key="folder.fullPath">
                    <div @click="activeFolder = folder.fullPath; searchQuery = ''" 
                         :style="'padding-left: ' + (folder.level * 12 + 16) + 'px'" 
                         :class="activeFolder === folder.fullPath && !searchQuery ? 'sidebar-active' : 'text-zinc-500 hover:text-zinc-300'" 
                         class="py-2.5 px-3 cursor-pointer text-[13px] font-medium truncate flex items-center justify-between group transition-colors">
                        <div class="flex items-center gap-2 overflow-hidden">
                            <i class="fa-solid fa-folder text-[11px] opacity-40"></i> 
                            <span class="truncate" x-text="folder.name"></span>
                        </div>
                        <!-- SIDEBAR ERROR BADGE -->
                        <span x-show="getFolderErrorCount(folder.fullPath) > 0" 
                              class="bg-red-600 text-white text-[9px] font-black px-1.5 py-0.5 rounded-full min-w-[18px] text-center"
                              x-text="getFolderErrorCount(folder.fullPath)"></span>
                    </div>
                </template>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="flex-1 bg-zinc-950 overflow-y-auto custom-scrollbar p-6">
            <template x-for="(groupFiles, scriptName) in groupedFiles" :key="scriptName">
                <div class="data-panel shadow-2xl">
                    <div class="px-5 py-3 border-b border-zinc-800 bg-zinc-900/40 flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <div class="w-2 h-2 rounded-full bg-blue-500"></div>
                            <span class="text-[11px] font-bold uppercase tracking-widest text-zinc-400" x-text="scriptName"></span>
                            <button @click="addNewEntry(groupFiles, scriptName)" class="btn-action !py-1 !px-3 hover:text-blue-400"><i class="fa-solid fa-plus"></i> Add Entry</button>
                        </div>
                    </div>

                    <div class="overflow-x-auto custom-scrollbar">
                        <table class="w-full text-left border-separate border-spacing-0">
                            <thead>
                                <tr class="bg-zinc-900/20">
                                    <th class="px-6 py-3 border-b border-zinc-800 text-[10px] font-bold text-zinc-500 uppercase col-id">Identifier</th>
                                    <template x-for="prop in getFieldsForGroup(scriptName, groupFiles)">
                                        <th class="px-4 py-3 border-b border-zinc-800 text-[10px] font-bold text-zinc-600 uppercase" x-text="prop"></th>
                                    </template>
                                    <th class="px-4 py-3 border-b border-zinc-800 w-[60px]"></th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="file in groupFiles" :key="file.id">
                                    <tr class="g-table-row group transition-all" :class="file.dirty && 'dirty-row'">
                                        <td class="px-6 col-id">
                                            <span class="text-[13px] font-semibold text-zinc-300 group-hover:text-white" x-text="file.name"></span>
                                        </td>
                                        <template x-for="prop in getFieldsForGroup(scriptName, groupFiles)">
                                            <td class="px-2">
                                                <div class="min-w-[140px] flex items-center gap-1 group/field relative">
                                                    <template x-if="getFieldType(file, prop) === 'bool'">
                                                        <button @click="file.data[prop] = !file.data[prop]; markDirty(file)" 
                                                                :class="file.data[prop] ? 'bg-blue-600' : 'bg-zinc-800'" class="w-9 h-5 rounded-full px-0.5 flex items-center transition-all">
                                                            <div :class="file.data[prop] ? 'translate-x-4' : 'translate-x-0'" class="w-4 h-4 bg-white rounded-full transition-all"></div>
                                                        </button>
                                                    </template>
                                                    <template x-if="getFieldType(file, prop) === 'enum' || getFieldType(file, prop) === 'export_enum'">
                                                        <select x-model="file.data[prop]" @change="markDirty(file)" class="g-input !h-8 text-xs appearance-none cursor-pointer">
                                                            <template x-for="(val, idx) in getHint(file, prop).options">
                                                                <option :value="getFieldType(file, prop) === 'enum' ? idx : val" x-text="val"></option>
                                                            </template>
                                                        </select>
                                                    </template>
                                                    <template x-if="['bool', 'enum', 'export_enum'].indexOf(getFieldType(file, prop)) === -1">
                                                        <div class="relative w-full">
                                                            <input type="text" x-model="file.data[prop]" @input="markDirty(file)" 
                                                                   :class="isInvalid(file, prop) && 'input-error shake-error'"
                                                                   class="g-input !h-8 focus:bg-zinc-950" placeholder="...">
                                                            <div x-show="isInvalid(file, prop)" class="absolute -right-1.5 -top-1.5 z-10">
                                                                <i class="fa-solid fa-circle-exclamation text-red-500 text-[10px] bg-zinc-950 rounded-full"></i>
                                                            </div>
                                                        </div>
                                                    </template>
                                                </div>
                                            </td>
                                        </template>
                                        <td class="px-2 text-center">
                                            <button @click="deleteEntry(file)" class="text-zinc-700 hover:text-red-500 transition-colors"><i class="fa-solid fa-trash-can text-sm"></i></button>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
            </template>
        </main>
    </div>

    <!-- MODAL: ERROR SUMMARY (EXPLORER) -->
    <div x-show="errorSummary.open" x-cloak class="fixed inset-0 z-[160] flex items-center justify-center p-6 bg-black/90 backdrop-blur-md">
        <div class="bg-zinc-950 w-full max-w-2xl rounded-2xl border border-zinc-800 flex flex-col shadow-2xl max-h-[80vh]" @click.away="errorSummary.open = false">
            <div class="px-6 py-4 border-b border-zinc-900 flex justify-between bg-red-950/20">
                <span class="text-xs font-bold uppercase text-red-500"><i class="fa-solid fa-bug mr-2"></i>Invalid Data Explorer</span>
                <button @click="errorSummary.open = false" class="text-zinc-500 hover:text-white"><i class="fa-solid fa-times"></i></button>
            </div>
            <div class="p-4 overflow-y-auto custom-scrollbar">
                <template x-if="errorList.length === 0">
                    <p class="text-center py-10 text-zinc-600 text-sm italic">No errors found. Everything is valid!</p>
                </template>
                <div class="space-y-2">
                    <template x-for="err in errorList" :key="err.id + err.prop">
                        <div @click="goToError(err)" class="bg-zinc-900/50 border border-zinc-800 p-3 rounded-lg hover:border-red-500/50 cursor-pointer group transition-all">
                            <div class="flex justify-between items-start mb-1">
                                <span class="text-[12px] font-bold text-zinc-200 group-hover:text-blue-400" x-text="err.fileName"></span>
                                <span class="text-[10px] bg-red-500/10 text-red-400 px-2 py-0.5 rounded uppercase font-bold" x-text="err.type"></span>
                            </div>
                            <div class="flex items-center gap-2 text-[11px] text-zinc-500 italic">
                                <span>Column: <span class="text-zinc-300 font-mono" x-text="err.prop"></span></span>
                                <i class="fa-solid fa-arrow-right text-[8px]"></i>
                                <span>Value: <span class="text-red-400" x-text="err.value === '' ? '(Empty)' : err.value"></span></span>
                            </div>
                            <div class="mt-2 text-[9px] text-zinc-600 uppercase tracking-widest">
                                <i class="fa-solid fa-folder mr-1"></i> <span x-text="err.folder"></span>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
            <div class="px-6 py-4 border-t border-zinc-900 flex justify-end bg-zinc-900/10 text-[10px] text-zinc-500 italic">
                Click on any item to jump to the resource.
            </div>
        </div>
    </div>

    <!-- MODAL: CREATE / IMPORT / TEXT EDITOR (GIỮ NGUYÊN) -->
    <div x-show="createModal.open" x-cloak class="fixed inset-0 z-[110] flex items-center justify-center p-6 bg-black/80 backdrop-blur-md">
        <!-- (Phần này giữ nguyên logic như bản cũ) -->
        <div class="bg-zinc-950 w-full max-w-lg rounded-2xl border border-zinc-800 p-6 space-y-4 shadow-2xl" @click.away="createModal.open = false">
            <h3 class="text-blue-500 font-bold uppercase text-[10px] tracking-widest">Create New Resource</h3>
            <input type="text" x-model="createModal.name" class="g-input !h-12 border-zinc-700" placeholder="Resource Name (e.g. item_sword)">
            <div class="grid grid-cols-2 gap-4">
                <button @click="createModal.ext = '.tres'" :class="createModal.ext === '.tres' ? 'border-blue-500 bg-blue-500/10 text-blue-400' : 'border-zinc-800'" class="border p-4 rounded-xl transition-all font-bold">.tres (Godot)</button>
                <button @click="createModal.ext = '.json'" :class="createModal.ext === '.json' ? 'border-blue-500 bg-blue-500/10 text-blue-400' : 'border-zinc-800'" class="border p-4 rounded-xl transition-all font-bold">.json (Data)</button>
            </div>
            <div class="flex justify-end gap-3 pt-4 border-t border-zinc-900">
                <button @click="createModal.open = false" class="px-4 py-2 text-xs font-bold text-zinc-500 uppercase">Cancel</button>
                <button @click="confirmCreateFile()" class="btn-action btn-primary !px-8">Create File</button>
            </div>
        </div>
    </div>

    <script>
        function editor() {
            return {
                allFiles: [], folders: [], scripts: {}, classMap: {}, activeFolder: '', searchQuery: '',
                rootHandle: null, dirtyCount: 0, errorCount: 0, isSaving: false,
                blacklist: ['script', 'uid', 'format', 'load_steps', 'atlas', 'texture', 'sprite_frames', 'icon'],
                godotTypes: ['ExtResource', 'SubResource', 'Rect2', 'Vector2', 'Vector3', 'Color', 'Transform2D'],
                originalTypes: new Map(),
                errorSummary: { open: false },
                createModal: { open: false, name: '', ext: '.tres', targetClone: '', cloneSearch: '' },
                importModal: { open: false, text: '' },
                addPropModal: { open: false, group: null, name: '', type: 'string', defaultValue: '' },

                async openProject() {
                    try { this.rootHandle = await window.showDirectoryPicker({ mode: 'readwrite' }); await this.loadProjectData(); } catch (e) { }
                },
                async reloadProject() {
                    if (this.dirtyCount > 0 && !confirm("Unsaved changes will be lost. Reload?")) return;
                    await this.loadProjectData();
                },
                async loadProjectData() {
                    this.isSaving = true; this.allFiles = []; this.scripts = {}; this.classMap = {}; this.originalTypes.clear();
                    this.dirtyCount = 0; this.errorCount = 0;
                    try { await this.scanDir(this.rootHandle, ""); this.buildTree(); this.checkGlobalErrors(); } finally { this.isSaving = false; }
                },
                async scanDir(handle, path) {
                    for await (const entry of handle.values()) {
                        const curPath = path + entry.name;
                        if (entry.kind === 'directory') await this.scanDir(entry, curPath + "/");
                        else {
                            const file = await entry.getFile(); const content = await file.text();
                            if (entry.name.endsWith('.gd')) this.parseGDScript(content, entry.name);
                            else if (entry.name.endsWith('.tres')) {
                                const { header, body } = this.splitTres(content);
                                const parsed = this.parseTresBody(body);
                                this.allFiles.push({ id: curPath, name: entry.name, path: curPath, folder: path.replace(/\/$/, "") || "root", handle: entry, data: parsed, type: 'tres', scriptName: this.getScriptNameFromTres(content), dirty: false, rawHeader: header });
                                this.recordTypes(curPath, parsed);
                            } else if (entry.name.endsWith('.json')) {
                                try {
                                    const json = JSON.parse(content);
                                    for (let [id, val] of Object.entries(json)) {
                                        const eid = curPath + ":" + id;
                                        this.allFiles.push({ id: eid, name: id, path: curPath, folder: path.replace(/\/$/, "") || "root", handle: entry, data: val, type: 'json', scriptName: entry.name, dirty: false });
                                        this.recordTypes(eid, val);
                                    }
                                } catch (e) { }
                            }
                        }
                    }
                },
                parseGDScript(content, fileName) {
                    const hints = {}; const enums = {};
                    const classNameMatch = content.match(/class_name\s+(\w+)/);
                    if (classNameMatch) this.classMap[classNameMatch[1]] = fileName;
                    const extendsMatch = content.match(/extends\s+(?:"res:\/\/([^"]+)"|(\w+))/);
                    let parent = extendsMatch ? (extendsMatch[1] ? extendsMatch[1].split('/').pop() : extendsMatch[2]) : null;
                    const enumMatches = content.matchAll(/enum\s+(\w+)\s*\{([\s\S]+?)\}/g);
                    for (const m of enumMatches) enums[m[1]] = m[2].split(',').map(v => v.trim().split('=')[0].trim()).filter(x => x);
                    content.split('\n').forEach(line => {
                        const l = line.trim(); const varMatch = l.match(/var\s+(\w+)/);
                        if (!varMatch) return; const varName = varMatch[1];
                        if (l.includes('@export_multiline')) hints[varName] = { type: 'multiline' };
                        else if (l.includes('@export_enum')) hints[varName] = { type: 'export_enum', options: l.match(/\(([\s\S]+?)\)/)[1].split(',').map(s => s.replace(/["']/g, "").trim()) };
                        else if (l.includes(': bool')) hints[varName] = { type: 'bool' };
                        else { for (let e in enums) { if (l.includes(`: ${e}`)) hints[varName] = { type: 'enum', options: enums[e] }; } }
                    });
                    this.scripts[fileName] = { hints, parent };
                },
                getScriptNameFromTres(content) {
                    const scriptRef = content.match(/script\s*=\s*ExtResource\("([^"]+)"\)/);
                    if (!scriptRef) return "StaticResource";
                    const id = scriptRef[1];
                    const extLine = content.split('\n').find(l => l.includes(`id="${id}"`) && l.includes('.gd'));
                    return extLine?.match(/path="res:\/\/([^"]+)"/)?.[1].split('/').pop() || "StaticResource";
                },
                splitTres(content) {
                    const marker = "[resource]"; const idx = content.indexOf(marker);
                    if (idx === -1) return { header: content, body: "" };
                    return { header: content.substring(0, idx + marker.length), body: content.substring(idx + marker.length) };
                },
                parseTresBody(bodyText) {
                    const data = {};
                    bodyText.split(/\r?\n/).forEach(line => {
                        const t = line.trim();
                        if (t && t.includes('=') && !t.startsWith('[')) {
                            const [k, ...v] = t.split('='); const key = k.trim(); let val = v.join('=').trim();
                            if (this.blacklist.includes(key.toLowerCase())) return;
                            if (val.startsWith('"') && val.endsWith('"')) val = val.substring(1, val.length - 1);
                            else if (val === "true") val = true; else if (val === "false") val = false;
                            else if (!isNaN(val) && val !== "") val = Number(val);
                            data[key] = val;
                        }
                    });
                    return data;
                },
                recordTypes(id, data) {
                    const types = {}; Object.entries(data).forEach(([k, v]) => types[k] = typeof v);
                    this.originalTypes.set(id, types);
                },
                // TÍNH TOÁN LỖI
                isInvalid(file, prop) {
                    const val = file.data[prop]; const types = this.originalTypes.get(file.id);
                    if (!types || !types[prop]) return false;
                    const targetType = types[prop];
                    if (targetType === 'number') return isNaN(val) || val === "" || val === null;
                    if (targetType === 'boolean') return typeof val !== 'boolean' && val !== 'true' && val !== 'false';
                    return false;
                },
                checkGlobalErrors() {
                    let count = 0; this.allFiles.forEach(f => {
                        Object.keys(f.data).forEach(p => { if (this.isInvalid(f, p)) count++; });
                    });
                    this.errorCount = count;
                },
                // DANH SÁCH LỖI CHI TIẾT
                get errorList() {
                    const list = [];
                    this.allFiles.forEach(f => {
                        const types = this.originalTypes.get(f.id);
                        if (!types) return;
                        Object.keys(f.data).forEach(prop => {
                            if (this.isInvalid(f, prop)) {
                                list.push({ id: f.id, fileName: f.name, prop, value: f.data[prop], folder: f.folder, type: types[prop] });
                            }
                        });
                    });
                    return list;
                },
                getFolderErrorCount(folderPath) {
                    return this.allFiles.filter(f => f.folder === folderPath && Object.keys(f.data).some(p => this.isInvalid(f, p))).length;
                },
                goToError(err) {
                    this.activeFolder = err.folder;
                    this.searchQuery = err.fileName;
                    this.errorSummary.open = false;
                },
                getHint(file, prop) {
                    let combinedHints = {}; let current = file.scriptName; let stack = 0;
                    while (current && stack < 10) {
                        let scriptInfo = this.scripts[current] || this.scripts[this.classMap[current]];
                        if (!scriptInfo) break;
                        combinedHints = { ...scriptInfo.hints, ...combinedHints };
                        current = scriptInfo.parent; stack++;
                    }
                    return combinedHints[prop] || { type: 'default' };
                },
                getFieldType(file, prop) { 
                    const h = this.getHint(file, prop);
                    if (h.type !== 'default') return h.type;
                    return typeof file.data[prop] === 'boolean' ? 'bool' : 'default';
                },
                getFieldsForGroup(scriptName, files) {
                    let keys = new Set();
                    files.forEach(f => Object.keys(f.data).forEach(k => {
                        if (typeof f.data[k] === 'string' && this.godotTypes.some(t => f.data[k].startsWith(t + "("))) return;
                        keys.add(k);
                    }));
                    return Array.from(keys);
                },
                get groupedFiles() {
                    let f = this.searchQuery ? this.allFiles.filter(f => f.name.toLowerCase().includes(this.searchQuery.toLowerCase())) : this.allFiles.filter(f => f.folder === this.activeFolder);
                    const groups = {}; f.forEach(x => { if (!groups[x.scriptName]) groups[x.scriptName] = []; groups[x.scriptName].push(x); });
                    return groups;
                },
                buildTree() {
                    const paths = [...new Set(this.allFiles.map(f => f.folder))];
                    this.folders = paths.sort().map(p => ({ name: p === "root" ? 'Resources' : p.split('/').pop(), fullPath: p, level: p === "root" ? 0 : p.split('/').length }));
                    if (this.folders.length > 0 && !this.activeFolder) this.activeFolder = this.folders[0].fullPath;
                },
                markDirty(f) { if (!f.dirty) { f.dirty = true; this.dirtyCount++; } this.checkGlobalErrors(); },
                addNewEntry(group, scriptName) {
                    const first = group[0]; const id = prompt("Identifier/Name:"); if (!id) return;
                    if (first.type === 'json') {
                        const emptyData = {};
                        Object.keys(first.data).forEach(key => {
                            const originalVal = first.data[key];
                            if (typeof originalVal === 'boolean') emptyData[key] = false;
                            else if (typeof originalVal === 'number') emptyData[key] = 0;
                            else emptyData[key] = "";
                        });
                        const newObj = { ...first, id: first.path + ":" + id, name: id, data: emptyData, dirty: true };
                        this.allFiles.push(newObj); this.recordTypes(newObj.id, newObj.data); this.dirtyCount++;
                    } else this.internalCreate(id, '.tres', first.id);
                },
                openCreateModal() { this.createModal = { open: true, name: '', ext: '.tres', targetClone: '', cloneSearch: '' }; },
                async confirmCreateFile() { if (this.createModal.name) await this.internalCreate(this.createModal.name, this.createModal.ext, this.createModal.targetClone); this.createModal.open = false; },
                async internalCreate(name, ext, templateId = null) {
                    const fullName = name.endsWith(ext) ? name : name + ext;
                    let dir = this.rootHandle; if (this.activeFolder !== "root") for (let p of this.activeFolder.split('/')) dir = await dir.getDirectoryHandle(p);
                    const handle = await dir.getFileHandle(fullName, { create: true });
                    const path = (this.activeFolder === "root" ? "" : this.activeFolder + "/") + fullName;
                    let data = {}; let header = `[gd_resource type="Resource" format=3]\n\n[resource]`;
                    let sName = ext === '.tres' ? "Godot Resource" : fullName;
                    if (ext === '.tres' && templateId) {
                        const src = this.allFiles.find(f => f.id === templateId);
                        if (src) { data = JSON.parse(JSON.stringify(src.data)); header = src.rawHeader; sName = src.scriptName; }
                    }
                    const newFile = { id: path, name: fullName, path, folder: this.activeFolder, handle, data, type: ext.replace('.',''), scriptName: sName, dirty: true, rawHeader: header };
                    this.allFiles.push(newFile); this.recordTypes(path, data); this.dirtyCount++;
                },
                async saveDirtyFiles() {
                    if (this.dirtyCount === 0 || this.errorCount > 0) return;
                    this.isSaving = true;
                    try {
                        const paths = [...new Set(this.allFiles.filter(f => f.dirty).map(f => f.path))];
                        for (let p of paths) {
                            const entries = this.allFiles.filter(f => f.path === p); const first = entries[0];
                            const w = await first.handle.createWritable();
                            if (first.type === 'tres') {
                                let content = first.rawHeader + "\n";
                                for (const [k, v] of Object.entries(first.data)) {
                                    let valStr = (typeof v === 'string' && !this.godotTypes.some(t => v.startsWith(t + "("))) ? `"${v}"` : v;
                                    content += `${k} = ${valStr}\n`;
                                }
                                await w.write(content);
                            } else {
                                const json = {}; entries.forEach(e => json[e.name] = e.data);
                                await w.write(JSON.stringify(json, null, "\t"));
                            }
                            await w.close(); entries.forEach(e => e.dirty = false);
                        }
                        this.dirtyCount = 0;
                    } finally { this.isSaving = false; }
                },
                async deleteEntry(file) {
                    if (!confirm("Delete permanently?")) return;
                    if (file.type === 'tres') { await file.handle.remove(); this.allFiles = this.allFiles.filter(f => f.id !== file.id); }
                    else { const p = file.path; this.allFiles = this.allFiles.filter(f => f.id !== file.id); this.allFiles.filter(f => f.path === p).forEach(f => this.markDirty(f)); }
                    this.buildTree();
                },
                exportAllData() {
                    const bundle = {}; this.allFiles.forEach(f => bundle[f.id] = f.data);
                    const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(bundle, null, 2)], {type:'application/json'}));
                    a.download = `database_export.json`; a.click();
                },
                async importData() {
                    const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
                    input.onchange = async (e) => { this.processImport(await e.target.files[0].text()); };
                    input.click();
                },
                confirmPasteImport() {
                    if (this.processImport(this.importModal.text)) { this.importModal.open = false; this.importModal.text = ''; }
                },
                processImport(jsonStr) {
                    try {
                        const imported = JSON.parse(jsonStr);
                        const fileMap = new Map(); this.allFiles.forEach(f => fileMap.set(f.id, f));
                        let count = 0;
                        for (const [id, val] of Object.entries(imported)) {
                            const target = fileMap.get(id);
                            if (target && JSON.stringify(target.data) !== JSON.stringify(val)) { target.data = val; this.markDirty(target); count++; }
                        }
                        alert(`Synced ${count} items successfully.`); return true;
                    } catch (e) { alert("Invalid JSON format."); return false; }
                }
            }
        }
    </script>
</body>
