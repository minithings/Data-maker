<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Database Game Maker v1.9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg-main: #09090b; --bg-side: #09090b; --bg-panel: #121217; --bg-input: #000000; --accent: #3b82f6; --border: #27272a; --text-main: #f4f4f5; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); color: var(--text-main); overflow: hidden; letter-spacing: -0.01em; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        .g-table-row td { height: 58px; vertical-align: middle; border-bottom: 1px solid var(--border); }
        .g-input { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-main); padding: 0 12px; border-radius: 8px; font-size: 13px; outline: none; width: 100%; height: 38px; transition: all 0.2s; }
        .g-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1); }
        .col-id { width: 220px; min-width: 220px; position: sticky; left: 0; z-index: 20; background: var(--bg-panel); border-right: 1px solid var(--border); }
        .sidebar-active { background: rgba(59, 130, 246, 0.1); color: #60a5fa !important; }
        .data-panel { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 24px; overflow: hidden; }
        [x-cloak] { display: none !important; }
        .btn-action { font-size: 11px; padding: 6px 14px; border-radius: 8px; background: #18181b; border: 1px solid #27272a; color: #a1a1aa; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; font-weight: 600; }
        .btn-action:hover { background: #27272a; color: white; }
        .btn-primary { background: #2563eb; color: white; border: none; }
        .btn-primary:hover { background: #3b82f6; }
        .dirty-row { border-left: 3px solid #f59e0b !important; }
    </style>
</head>

<body x-data="editor()" @keydown.window.prevent.ctrl.s="saveDirtyFiles()" class="h-screen flex flex-col">

    <!-- SYNCING OVERLAY -->
    <div x-show="isSaving" x-cloak class="fixed inset-0 bg-black/80 z-[100] flex flex-col items-center justify-center backdrop-blur-sm">
        <div class="w-10 h-10 border-2 border-white/20 border-t-white rounded-full animate-spin"></div>
        <p class="mt-4 text-[10px] font-bold uppercase tracking-widest text-zinc-400">Syncing to disk...</p>
    </div>

    <!-- NAVBAR -->
    <nav class="h-14 border-b border-zinc-800 bg-zinc-950 flex items-center justify-between px-4 z-30">
        <div class="flex items-center gap-4">
            <h1 class="text-xs font-bold uppercase tracking-tighter">Data Maker <span class="text-blue-500 font-black">V1.9</span></h1>
            <button @click="openProject()" class="btn-action !py-1.5"><i class="fa-solid fa-folder-open text-blue-500"></i> Open Project</button>
        </div>
        <div class="flex items-center gap-4">
            <input type="text" x-model="searchQuery" placeholder="Quick search..." class="g-input !w-64">
            <button @click="saveDirtyFiles()" :disabled="dirtyCount === 0" :class="dirtyCount > 0 ? 'btn-primary' : 'opacity-30 cursor-not-allowed'" class="btn-action px-8 uppercase tracking-widest">
                Sync (<span x-text="dirtyCount"></span>)
            </button>
        </div>
    </nav>

    <div class="flex-1 flex overflow-hidden">
        <!-- SIDEBAR -->
        <aside class="w-64 bg-zinc-950 flex flex-col border-r border-zinc-900 shrink-0">
            <div class="p-4 flex flex-col gap-4">
                <button @click="openCreateModal()" class="btn-action btn-primary w-full justify-center">
                    <i class="fa-solid fa-plus-circle"></i> New Resource
                </button>
                <div class="text-[10px] font-bold text-zinc-600 uppercase tracking-widest">Folders</div>
            </div>
            <div class="flex-1 overflow-y-auto custom-scrollbar">
                <template x-for="folder in folders" :key="folder.fullPath">
                    <div @click="activeFolder = folder.fullPath" 
                         :style="'padding-left: ' + (folder.level * 12 + 16) + 'px'" 
                         :class="activeFolder === folder.fullPath ? 'sidebar-active' : 'text-zinc-500 hover:text-zinc-300'" 
                         class="py-2.5 px-3 cursor-pointer text-[13px] font-medium truncate flex items-center gap-2">
                        <i class="fa-solid fa-folder text-[11px] opacity-40"></i> <span x-text="folder.name"></span>
                    </div>
                </template>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="flex-1 bg-zinc-950 overflow-y-auto custom-scrollbar p-6">
            <template x-for="(groupFiles, scriptName) in groupedFiles" :key="scriptName">
                <div class="data-panel">
                    <div class="px-5 py-3 border-b border-zinc-800 flex items-center justify-between bg-zinc-900/20">
                        <div class="flex items-center gap-3">
                            <span class="text-[11px] font-bold uppercase tracking-widest text-zinc-400" x-text="scriptName"></span>
                            
                            <!-- CẢ TRES VÀ JSON ĐỀU CÓ NEW ENTRY -->
                            <button @click="addNewEntry(groupFiles, scriptName)" class="btn-action !py-1 !px-3">
                                <i class="fa-solid fa-plus text-blue-500"></i> New Entry
                            </button>

                            <!-- CHỈ JSON MỚI CÓ ADD COLUMN -->
                            <template x-if="groupFiles[0].type === 'json'">
                                <button @click="openAddPropModal(groupFiles)" class="btn-action !py-1 !px-3">
                                    <i class="fa-solid fa-columns"></i> Add Column
                                </button>
                            </template>
                        </div>
                    </div>

                    <div class="overflow-x-auto custom-scrollbar">
                        <table class="w-full text-left border-separate border-spacing-0">
                            <thead>
                                <tr class="bg-zinc-900/30">
                                    <th class="px-6 py-3 border-b border-zinc-800 text-[10px] font-bold text-zinc-500 uppercase col-id">Identifier</th>
                                    <template x-for="prop in getFieldsForGroup(scriptName, groupFiles)">
                                        <th class="px-4 py-3 border-b border-zinc-800 text-[10px] font-bold text-zinc-600 uppercase min-w-[150px]" x-text="prop"></th>
                                    </template>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="file in groupFiles" :key="file.id">
                                    <tr class="g-table-row group transition-colors" :class="file.dirty && 'dirty-row'">
                                        <td class="px-6 col-id">
                                            <span class="text-[13px] font-semibold text-zinc-300" x-text="file.name"></span>
                                        </td>
                                        <template x-for="prop in getFieldsForGroup(scriptName, groupFiles)">
                                            <td class="px-2">
                                                <template x-if="typeof file.data[prop] === 'boolean'">
                                                    <button @click="file.data[prop] = !file.data[prop]; markDirty(file)" 
                                                            :class="file.data[prop] ? 'bg-green-600' : 'bg-zinc-800'" class="w-9 h-5 rounded-full px-0.5 flex items-center transition-all">
                                                        <div :class="file.data[prop] ? 'translate-x-4' : 'translate-x-0'" class="w-4 h-4 bg-white rounded-full transition-all"></div>
                                                    </button>
                                                </template>
                                                <template x-if="typeof file.data[prop] !== 'boolean'">
                                                    <input type="text" :value="file.data[prop]" @input="updateCellValue(file, prop, $event.target.value)"
                                                           class="g-input" :class="typeof file.data[prop] === 'number' && 'text-blue-400 font-mono'">
                                                </template>
                                            </td>
                                        </template>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
            </template>
        </main>
    </div>

    <!-- MODAL: CREATE RESOURCE (Sidebar) -->
    <div x-show="createModal.open" x-cloak class="fixed inset-0 z-[110] flex items-center justify-center p-6 bg-black/80 backdrop-blur-md">
        <div class="bg-zinc-950 w-full max-w-lg rounded-2xl border border-zinc-800 p-6 space-y-4">
            <h3 class="text-blue-500 font-bold uppercase text-[11px] tracking-widest">Create New Resource</h3>
            <input type="text" x-model="createModal.name" class="g-input" placeholder="File name...">
            <div class="grid grid-cols-2 gap-4">
                <button @click="createModal.ext = '.tres'" :class="createModal.ext === '.tres' ? 'border-blue-500 bg-blue-500/10 text-blue-400' : 'border-zinc-800'" class="border p-3 rounded-xl transition-all font-bold">.tres</button>
                <button @click="createModal.ext = '.json'" :class="createModal.ext === '.json' ? 'border-blue-500 bg-blue-500/10 text-blue-400' : 'border-zinc-800'" class="border p-3 rounded-xl transition-all font-bold">.json</button>
            </div>
            <template x-if="createModal.ext === '.tres'">
                <div class="pt-3 space-y-2">
                    <label class="text-[10px] font-bold text-zinc-500 uppercase">Clone from Template</label>
                    <div class="h-40 overflow-y-auto custom-scrollbar border border-zinc-900 rounded-lg p-1 bg-zinc-900/30">
                        <template x-for="f in allFiles.filter(f => f.type === 'tres')" :key="f.id">
                            <div @click="createModal.targetClone = f.id" :class="createModal.targetClone === f.id ? 'bg-blue-500/20 text-blue-400' : ''" class="p-2 rounded text-[12px] cursor-pointer hover:bg-white/5 truncate" x-text="f.name"></div>
                        </template>
                    </div>
                </div>
            </template>
            <div class="flex justify-end gap-3 pt-4 border-t border-zinc-900">
                <button @click="createModal.open = false" class="text-xs font-bold text-zinc-500 uppercase px-4">Cancel</button>
                <button @click="confirmCreateFile()" class="btn-action btn-primary !px-8 uppercase">Create</button>
            </div>
        </div>
    </div>

    <!-- MODAL: ADD COLUMN -->
    <div x-show="addPropModal.open" x-cloak class="fixed inset-0 z-[110] flex items-center justify-center p-6 bg-black/80 backdrop-blur-md">
        <div class="bg-zinc-950 w-full max-w-md rounded-2xl border border-zinc-800 p-6 space-y-4" @click.away="addPropModal.open = false">
            <h3 class="text-zinc-400 font-bold uppercase text-[10px]">Add Column (JSON Only)</h3>
            <input type="text" x-model="addPropModal.name" class="g-input" placeholder="Property Name">
            <select x-model="addPropModal.type" class="g-input">
                <option value="string">String</option>
                <option value="number">Number</option>
                <option value="boolean">Boolean</option>
            </select>
            <input type="text" x-model="addPropModal.defaultValue" class="g-input" placeholder="Default Value">
            <div class="flex justify-end gap-3"><button @click="confirmAddProperty()" class="btn-action btn-primary">Add Column</button></div>
        </div>
    </div>

    <script>
        function editor() {
            return {
                allFiles: [], folders: [], activeFolder: '', searchQuery: '', rootHandle: null,
                dirtyCount: 0, isSaving: false, sidebarOpen: true,
                blacklist: ['script', 'atlas', 'region', 'uid', 'texture', 'sprite', 'frames', 'format', 'load_steps', 'id', 'Resource', 'icon'],
                addPropModal: { open: false, group: null, name: '', type: 'string', defaultValue: '' },
                createModal: { open: false, name: '', ext: '.tres', targetClone: '' },

                async openProject() {
                    try {
                        this.rootHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
                        this.allFiles = [];
                        await this.scanDir(this.rootHandle, "");
                        this.buildTree();
                    } catch (e) { }
                },

                async scanDir(handle, path) {
                    for await (const entry of handle.values()) {
                        const curPath = path + entry.name;
                        if (entry.kind === 'directory') await this.scanDir(entry, curPath + "/");
                        else {
                            const file = await entry.getFile();
                            const content = await file.text();
                            if (entry.name.endsWith('.tres')) {
                                this.allFiles.push({ id: curPath, name: entry.name, path: curPath, folder: path.replace(/\/$/, "") || "root", handle: entry, data: this.parseTres(content), type: 'tres', scriptName: "Godot Resource", dirty: false, rawHeader: content.split('[resource]')[0] });
                            } else if (entry.name.endsWith('.json')) {
                                try {
                                    const json = JSON.parse(content);
                                    for (let [id, val] of Object.entries(json)) {
                                        this.allFiles.push({ id: curPath + ":" + id, name: id, path: curPath, folder: path.replace(/\/$/, "") || "root", handle: entry, data: val, type: 'json', scriptName: entry.name, dirty: false });
                                    }
                                } catch (e) {}
                            }
                        }
                    }
                },

                buildTree() {
                    const paths = [...new Set(this.allFiles.map(f => f.folder))];
                    this.folders = paths.sort().map(p => ({ name: p === "root" ? 'Root' : p.split('/').pop(), fullPath: p, level: p === "root" ? 0 : p.split('/').length }));
                    if (this.folders.length > 0 && !this.activeFolder) this.activeFolder = this.folders[0].fullPath;
                },

                openCreateModal() { this.createModal = { open: true, name: '', ext: '.tres', targetClone: '' }; },

                async confirmCreateFile() {
                    if (!this.createModal.name || !this.rootHandle) return;
                    await this.internalCreateResource(this.createModal.name, this.createModal.ext, this.createModal.targetClone);
                    this.createModal.open = false;
                },

                // HÀM TẠO FILE VẬT LÝ (.tres)
                async internalCreateResource(name, ext, templateId) {
                    const fullFileName = name.endsWith(ext) ? name : name + ext;
                    try {
                        let dirHandle = this.rootHandle;
                        if (this.activeFolder !== "root") {
                            for (let p of this.activeFolder.split('/')) dirHandle = await dirHandle.getDirectoryHandle(p);
                        }
                        const fileHandle = await dirHandle.getFileHandle(fullFileName, { create: true });
                        let data = {};
                        let header = `[gd_resource type="Resource" format=3]\n\n`;

                        if (ext === '.tres' && templateId) {
                            const source = this.allFiles.find(f => f.id === templateId);
                            data = JSON.parse(JSON.stringify(source.data));
                            header = source.rawHeader;
                        }

                        const newPath = (this.activeFolder === "root" ? "" : this.activeFolder + "/") + fullFileName;
                        const newObj = {
                            id: newPath, name: fullFileName, path: newPath, folder: this.activeFolder, 
                            handle: fileHandle, data: data, type: ext === '.tres' ? 'tres' : 'json',
                            scriptName: ext === '.tres' ? "Godot Resource" : fullFileName,
                            dirty: true, rawHeader: header
                        };

                        if (ext === '.json') {
                            this.allFiles.push({ ...newObj, id: newPath + ":new", name: "new_item", data: { "name": name } });
                        } else {
                            this.allFiles.push(newObj);
                        }
                        this.dirtyCount++;
                    } catch (e) { alert(e.message); }
                },

                // NÚT NEW ENTRY TẠI BẢNG
                async addNewEntry(group, scriptName) {
                    const first = group[0];
                    if (first.type === 'json') {
                        // Logic JSON: Thêm key mới vào file cũ
                        const id = prompt("New Entry ID:");
                        if (!id) return;
                        const template = JSON.parse(JSON.stringify(first.data));
                        Object.keys(template).forEach(k => { if (typeof template[k] === 'number') template[k] = 0; else if (typeof template[k] === 'boolean') template[k] = false; else template[k] = ""; });
                        this.allFiles.push({ ...first, id: first.path + ":" + id, name: id, data: template, dirty: true });
                        this.dirtyCount++;
                    } else {
                        // Logic TRES: Tạo file .tres mới bằng cách Clone file đầu tiên trong bảng
                        const newFileName = prompt("Nhập tên file .tres mới:");
                        if (!newFileName) return;
                        await this.internalCreateResource(newFileName, '.tres', first.id);
                    }
                },

                parseTres(content) {
                    const body = {};
                    content.split(/\r?\n/).forEach(line => {
                        if (line.includes('=') && !line.startsWith('[')) {
                            const [k, ...v] = line.split('='); const key = k.trim();
                            if (this.blacklist.includes(key.toLowerCase())) return;
                            let val = v.join('=').trim().replace(/^"|"$/g, '');
                            if (val === "true") val = true; else if (val === "false") val = false;
                            else if (!isNaN(val) && val !== "") val = Number(val);
                            body[key] = val;
                        }
                    });
                    return body;
                },

                get groupedFiles() {
                    let f = this.searchQuery ? this.allFiles.filter(f => f.name.toLowerCase().includes(this.searchQuery.toLowerCase())) : this.allFiles.filter(f => f.folder === this.activeFolder);
                    const groups = {};
                    f.forEach(x => { if (!groups[x.scriptName]) groups[x.scriptName] = []; groups[x.scriptName].push(x); });
                    return groups;
                },

                getFieldsForGroup(script, files) { let keys = new Set(); files.forEach(f => Object.keys(f.data).forEach(k => keys.add(k))); return Array.from(keys); },
                updateCellValue(f, p, v) { if (typeof f.data[p] === 'number') f.data[p] = v === "" ? 0 : (isNaN(v) ? v : Number(v)); else f.data[p] = v; this.markDirty(f); },
                openAddPropModal(g) { this.addPropModal = { open: true, group: g, name: '', type: 'string', defaultValue: '' }; },
                confirmAddProperty() {
                    const { name, type, defaultValue, group } = this.addPropModal;
                    let val = type === 'number' ? Number(defaultValue) : (type === 'boolean' ? (defaultValue === 'true') : String(defaultValue));
                    group.forEach(f => { if (!(name in f.data)) { f.data[name] = val; this.markDirty(f); } });
                    this.addPropModal.open = false;
                },
                markDirty(f) { if (!f.dirty) { f.dirty = true; this.dirtyCount++; } },

                async saveDirtyFiles() {
                    if (this.dirtyCount === 0) return; this.isSaving = true;
                    try {
                        const paths = [...new Set(this.allFiles.filter(f => f.dirty).map(f => f.path))];
                        for (let p of paths) {
                            const entries = this.allFiles.filter(f => f.path === p);
                            const first = entries[0];
                            const w = await first.handle.createWritable();
                            if (first.type === 'tres') {
                                let content = first.rawHeader + "[resource]\n";
                                Object.keys(first.data).forEach(k => { let v = first.data[k]; content += `${k} = ${typeof v === 'string' ? '"'+v+'"' : v}\n`; });
                                await w.write(content);
                            } else {
                                const json = {}; entries.forEach(e => json[e.name] = e.data);
                                await w.write(JSON.stringify(json, null, "\t"));
                            }
                            await w.close(); entries.forEach(e => e.dirty = false);
                        }
                        this.dirtyCount = 0;
                    } catch (e) { alert(e.message); } finally { this.isSaving = false; }
                }
            }
        }
    </script>
</body>
</html>
