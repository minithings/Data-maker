<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Database Maker v4.1 - Pro Max Workflow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg-main: #09090b; --bg-side: #09090b; --bg-panel: #121217; --bg-input: #000000; --accent: #3b82f6; --border: #27272a; --text-main: #f4f4f5; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); color: var(--text-main); overflow: hidden; letter-spacing: -0.01em; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        .g-table-row td { height: 58px; vertical-align: middle; border-bottom: 1px solid var(--border); }
        .g-input { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-main); padding: 0 12px; border-radius: 8px; font-size: 13px; outline: none; width: 100%; height: 38px; transition: all 0.2s; }
        .g-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1); }
        .input-error { border-color: #ef4444 !important; background-color: rgba(239, 68, 68, 0.05) !important; color: #f87171 !important; }
        .sidebar-active { background: rgba(59, 130, 246, 0.1); color: #60a5fa !important; }
        .data-panel { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 24px; overflow: hidden; }
        [x-cloak] { display: none !important; }
        .btn-action { font-size: 11px; padding: 6px 14px; border-radius: 8px; background: #18181b; border: 1px solid #27272a; color: #a1a1aa; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; font-weight: 600; }
        .btn-action:hover { background: #27272a; color: white; }
        .btn-primary { background: #2563eb; color: white; border: none; }
        .btn-primary:hover { background: #3b82f6; }
        .dirty-row { border-left: 3px solid #f59e0b !important; }
        .col-id { width: 220px; min-width: 220px; position: sticky; left: 0; z-index: 20; background: var(--bg-panel); border-right: 1px solid var(--border); }
        .type-number { color: #60a5fa !important; font-family: 'JetBrains Mono', monospace; }
        .shake-error { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-2px, 0, 0); } 40%, 60% { transform: translate3d(2px, 0, 0); } }
    </style>
</head>

<body x-data="editor()" @keydown.window.prevent.ctrl.s="saveDirtyFiles()" class="h-screen flex flex-col">

    <!-- LOADING OVERLAY -->
    <div x-show="isSaving" x-cloak class="fixed inset-0 bg-black/80 z-[200] flex flex-col items-center justify-center backdrop-blur-sm font-mono text-xs">
        <div class="w-10 h-10 border-2 border-white/20 border-t-white rounded-full animate-spin"></div>
        <p class="mt-4 text-zinc-400 uppercase tracking-widest">Processing...</p>
    </div>

    <!-- NAVBAR -->
    <nav class="h-14 border-b border-zinc-800 bg-zinc-950 flex items-center justify-between px-4 z-30">
        <div class="flex items-center gap-4">
            <h1 class="text-xs font-bold uppercase tracking-tighter">Data Maker <span class="text-blue-500 font-black">V4.1 Final</span></h1>
            <button @click="openProject()" class="btn-action"><i class="fa-solid fa-folder-open text-blue-500"></i> Open</button>
            <button @click="reloadProject()" class="btn-action" :disabled="!rootHandle" :class="!rootHandle && 'opacity-20'"><i class="fa-solid fa-rotate text-green-500"></i> Reload</button>
            <div class="h-4 w-[1px] bg-zinc-800 mx-1"></div>
            <button @click="exportAllData()" class="btn-action"><i class="fa-solid fa-file-export text-orange-400"></i> Export</button>
            <div class="flex items-center bg-zinc-900 rounded-lg p-0.5 border border-zinc-800">
                <button @click="importData()" class="btn-action !border-none !bg-transparent px-3" title="Import from File"><i class="fa-solid fa-file-import text-green-400"></i></button>
                <div class="w-[1px] h-3 bg-zinc-800"></div>
                <button @click="importModal.open = true" class="btn-action !border-none !bg-transparent px-3" title="Paste JSON string"><i class="fa-solid fa-paste text-blue-400"></i> Paste JSON</button>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <button @click="errorSummary.open = true" class="text-[10px] font-bold text-red-500 bg-red-500/10 px-3 py-2 rounded-lg border border-red-500/20" x-show="errorCount > 0">
                <i class="fa-solid fa-triangle-exclamation mr-1"></i> <span x-text="errorCount"></span> ISSUES
            </button>
            <input type="text" x-model="searchQuery" placeholder="Search..." class="g-input !w-64">
            <button @click="saveDirtyFiles()" :disabled="dirtyCount === 0 || errorCount > 0" :class="(dirtyCount > 0 && errorCount === 0) ? 'btn-primary' : 'opacity-30'" class="btn-action px-8 uppercase tracking-widest">
                Sync (<span x-text="dirtyCount"></span>)
            </button>
        </div>
    </nav>

    <div class="flex-1 flex overflow-hidden">
        <!-- SIDEBAR -->
        <aside class="w-64 bg-zinc-950 flex flex-col border-r border-zinc-900 shrink-0">
            <div class="p-4">
                <button @click="openCreateModal()" class="btn-action btn-primary w-full justify-center"><i class="fa-solid fa-plus-circle"></i> New Resource</button>
            </div>
            <div class="flex-1 overflow-y-auto custom-scrollbar border-t border-zinc-900">
                <template x-for="folder in folders" :key="folder.fullPath">
                    <div @click="activeFolder = folder.fullPath; searchQuery = ''" 
                         :style="'padding-left: ' + (folder.level * 12 + 16) + 'px'" 
                         :class="activeFolder === folder.fullPath && !searchQuery ? 'sidebar-active' : 'text-zinc-500 hover:text-zinc-300'" 
                         class="py-2.5 px-3 cursor-pointer text-[13px] font-medium truncate flex items-center justify-between group transition-colors">
                        <div class="flex items-center gap-2 overflow-hidden">
                            <i class="fa-solid fa-folder text-[11px] opacity-40"></i> 
                            <span class="truncate" x-text="folder.name"></span>
                        </div>
                        <span x-show="getFolderErrorCount(folder.fullPath) > 0" class="bg-red-600 text-white text-[9px] font-black px-1.5 py-0.5 rounded-full min-w-[18px] text-center" x-text="getFolderErrorCount(folder.fullPath)"></span>
                    </div>
                </template>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="flex-1 bg-zinc-950 overflow-y-auto custom-scrollbar p-6">
            <template x-for="(groupFiles, scriptName) in groupedFiles" :key="scriptName">
                <div class="data-panel shadow-2xl">
                    <div class="px-5 py-3 border-b border-zinc-800 bg-zinc-900/40 flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <div class="w-2 h-2 rounded-full bg-blue-500"></div>
                            <span class="text-[11px] font-bold uppercase tracking-widest text-zinc-400" x-text="scriptName"></span>
                            <button @click="addNewEntry(groupFiles, scriptName)" class="btn-action !py-1 !px-3 hover:text-blue-400"><i class="fa-solid fa-plus"></i> Entry</button>
                            
                            <!-- ĐÃ ẨN NÚT COLUMN KHI LÀ FILE TRES -->
                            <button x-show="groupFiles[0].type !== 'tres'" @click="openAddPropModal(groupFiles)" class="btn-action !py-1 !px-3 hover:text-green-400 border-green-900/20"><i class="fa-solid fa-table-columns"></i> Column</button>
                        </div>
                    </div>

                    <div class="overflow-x-auto custom-scrollbar">
                        <table class="w-full text-left border-separate border-spacing-0">
                            <thead>
                                <tr class="bg-zinc-900/20">
                                    <th class="px-6 py-3 border-b border-zinc-800 text-[10px] font-bold text-zinc-500 uppercase col-id">Identifier</th>
                                    <template x-for="prop in getFieldsForGroup(scriptName, groupFiles)">
                                        <th class="px-4 py-3 border-b border-zinc-800 text-[10px] font-bold text-zinc-600 uppercase" x-text="prop"></th>
                                    </template>
                                    <th class="px-4 py-3 border-b border-zinc-800 w-[60px]"></th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="file in groupFiles" :key="file.id">
                                    <tr class="g-table-row group transition-all" :class="file.dirty && 'dirty-row'">
                                        <td class="px-6 col-id">
                                            <span class="text-[13px] font-semibold text-zinc-300 group-hover:text-white" x-text="file.name"></span>
                                        </td>
                                        <template x-for="prop in getFieldsForGroup(scriptName, groupFiles)">
                                            <td class="px-2">
                                                <div class="min-w-[140px] flex items-center gap-1 group/field relative">
                                                    
                                                    <!-- MULTILINE EDIT POPUP -->
                                                    <template x-if="getFieldType(file, prop) === 'multiline'">
                                                        <div class="flex items-center gap-2 w-full">
                                                            <input type="text" :value="file.data[prop]" readonly @click="openMultiline(file, prop)"
                                                                   class="g-input !h-8 cursor-pointer overflow-hidden truncate italic text-zinc-500" placeholder="Click to edit...">
                                                            <button @click="openMultiline(file, prop)" class="text-blue-500 hover:text-blue-400"><i class="fa-solid fa-expand"></i></button>
                                                        </div>
                                                    </template>

                                                    <!-- BOOL -->
                                                    <template x-if="getFieldType(file, prop) === 'bool'">
                                                        <button @click="file.data[prop] = !file.data[prop]; markDirty(file)" 
                                                                :class="file.data[prop] ? 'bg-blue-600' : 'bg-zinc-800'" class="w-9 h-5 rounded-full px-0.5 flex items-center transition-all">
                                                            <div :class="file.data[prop] ? 'translate-x-4' : 'translate-x-0'" class="w-4 h-4 bg-white rounded-full transition-all"></div>
                                                        </button>
                                                    </template>

                                                    <!-- ENUM -->
                                                    <template x-if="getFieldType(file, prop) === 'enum' || getFieldType(file, prop) === 'export_enum'">
                                                        <select :value="file.data[prop]" @change="updateValue(file, prop, $event.target.value)" class="g-input !h-8 text-xs appearance-none cursor-pointer">
                                                            <template x-for="(val, idx) in getHint(file, prop).options">
                                                                <option :value="getFieldType(file, prop) === 'enum' ? idx : val" x-text="val" :selected="file.data[prop] == (getFieldType(file, prop) === 'enum' ? idx : val)"></option>
                                                            </template>
                                                        </select>
                                                    </template>

                                                    <!-- TEXT / NUMBER (FIXED) -->
                                                    <template x-if="['bool', 'enum', 'export_enum', 'multiline'].indexOf(getFieldType(file, prop)) === -1">
                                                        <div class="relative w-full">
                                                            <input type="text" :value="file.data[prop]" @input="updateValue(file, prop, $event.target.value)" 
                                                                   :class="[hasIssue(file, prop) && 'input-error shake-error', typeof file.data[prop] === 'number' && 'type-number']"
                                                                   class="g-input !h-8 focus:bg-zinc-950" placeholder="...">
                                                            <div x-show="hasIssue(file, prop)" class="absolute -right-1.5 -top-1.5 z-10">
                                                                <i class="fa-solid fa-circle-exclamation text-red-500 text-[10px] bg-zinc-950 rounded-full"></i>
                                                            </div>
                                                        </div>
                                                    </template>
                                                </div>
                                            </td>
                                        </template>
                                        <td class="px-2 text-center">
                                            <button @click="deleteEntry(file)" class="text-zinc-700 hover:text-red-500 transition-colors"><i class="fa-solid fa-trash-can text-sm"></i></button>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
            </template>
        </main>
    </div>

    <!-- PHẦN CÒN LẠI GIỮ NGUYÊN ... -->
    <div x-show="multilineModal.open" x-cloak class="fixed inset-0 z-[300] flex items-center justify-center p-6 bg-black/90 backdrop-blur-md">
        <div class="bg-zinc-950 w-full max-w-3xl rounded-2xl border border-zinc-800 shadow-2xl flex flex-col overflow-hidden h-[80vh]">
            <div class="px-6 py-4 border-b border-zinc-900 bg-zinc-900/30 flex justify-between items-center">
                <span class="text-[10px] font-bold uppercase tracking-widest text-blue-500">Edit Long Text Content</span>
                <span class="text-[10px] text-zinc-500 font-mono" x-text="multilineModal.prop"></span>
            </div>
            <textarea x-model="multilineModal.text" class="flex-1 bg-zinc-950 p-6 text-[13px] text-zinc-300 outline-none resize-none font-mono leading-relaxed" placeholder="Write content here..."></textarea>
            <div class="px-6 py-4 border-t border-zinc-900 bg-zinc-900/10 flex justify-end gap-3">
                <button @click="multilineModal.open = false" class="text-xs font-bold text-zinc-500 uppercase px-4">Close</button>
                <button @click="saveMultiline()" class="btn-action btn-primary !px-8">Update Content</button>
            </div>
        </div>
    </div>

    <div x-show="createModal.open" x-cloak class="fixed inset-0 z-[110] flex items-center justify-center p-6 bg-black/80 backdrop-blur-md">
        <div class="bg-zinc-950 w-full max-w-lg rounded-2xl border border-zinc-800 p-6 space-y-4 shadow-2xl" @click.away="createModal.open = false">
            <h3 class="text-blue-500 font-bold uppercase text-[10px] tracking-widest">Create New Resource</h3>
            <input type="text" x-model="createModal.name" class="g-input !h-12 border-zinc-700" placeholder="Resource Filename">
            <div class="grid grid-cols-2 gap-4">
                <button @click="createModal.ext = '.tres'" :class="createModal.ext === '.tres' ? 'border-blue-500 bg-blue-500/10 text-blue-400' : 'border-zinc-800'" class="border p-4 rounded-xl transition-all font-bold">.tres</button>
                <button @click="createModal.ext = '.json'" :class="createModal.ext === '.json' ? 'border-blue-500 bg-blue-500/10 text-blue-400' : 'border-zinc-800'" class="border p-4 rounded-xl transition-all font-bold">.json</button>
            </div>

            <!-- TRES SPECIFIC: CLONE STRUCTURE -->
            <div x-show="createModal.ext === '.tres'" class="space-y-2">
                <label class="text-[10px] font-bold text-zinc-600 uppercase italic">Clone structure from:</label>
                <input type="text" x-model="createModal.cloneSearch" class="g-input" placeholder="Search templates...">
                <div class="max-h-32 overflow-y-auto custom-scrollbar border border-zinc-800 rounded-lg bg-black/30">
                    <template x-for="tpl in filteredTemplates" :key="tpl.id">
                        <div @click="createModal.targetClone = tpl.id" :class="createModal.targetClone === tpl.id ? 'bg-blue-600/30 text-blue-400' : 'hover:bg-zinc-900 text-zinc-500'" class="px-3 py-2 text-xs cursor-pointer border-b border-zinc-900/50 flex justify-between items-center">
                            <span x-text="tpl.name"></span><span class="text-[9px] opacity-30" x-text="tpl.scriptName"></span>
                        </div>
                    </template>
                </div>
            </div>

            <!-- JSON SPECIFIC: NEW STRUCTURE DEFINITION -->
            <div x-show="createModal.ext === '.json'" class="space-y-3 pt-2 border-t border-zinc-900">
                <label class="text-[10px] font-bold text-zinc-600 uppercase italic">Define Initial Object Schema:</label>
                
                <!-- Input Add Prop -->
                <div class="flex gap-2">
                    <input type="text" x-model="createModal.jsonNewPropName" class="g-input flex-1" placeholder="Prop Name">
                    <select x-model="createModal.jsonNewPropType" class="g-input !w-24">
                        <option value="string">String</option>
                        <option value="number">Number</option>
                        <option value="boolean">Bool</option>
                    </select>
                    <button @click="addJsonPropToSchema()" class="btn-action !bg-blue-600 text-white border-none"><i class="fa-solid fa-plus"></i></button>
                </div>

                <!-- List of added props -->
                <div class="space-y-1 max-h-32 overflow-y-auto custom-scrollbar bg-black/20 rounded-lg p-2 border border-zinc-900">
                    <template x-if="createModal.jsonSchema.length === 0">
                        <div class="text-[10px] text-zinc-600 text-center py-2 uppercase tracking-tighter">No properties added (Empty Object)</div>
                    </template>
                    <template x-for="(p, index) in createModal.jsonSchema" :key="index">
                        <div class="flex items-center justify-between bg-zinc-900/50 px-3 py-1.5 rounded border border-zinc-800 group">
                            <div class="flex items-center gap-2">
                                <span class="text-xs font-mono text-blue-400" x-text="p.name"></span>
                                <span class="text-[9px] px-1.5 bg-zinc-800 text-zinc-500 rounded uppercase" x-text="p.type"></span>
                            </div>
                            <button @click="createModal.jsonSchema.splice(index, 1)" class="text-zinc-600 hover:text-red-500"><i class="fa-solid fa-xmark"></i></button>
                        </div>
                    </template>
                </div>
            </div>

            <div class="flex justify-end gap-3 pt-4 border-t border-zinc-900">
                <button @click="createModal.open = false" class="px-4 text-xs font-bold text-zinc-500 uppercase">Cancel</button>
                <button @click="confirmCreateFile()" class="btn-action btn-primary !px-8">Create</button>
            </div>
        </div>
    </div>

    <div x-show="addPropModal.open" x-cloak class="fixed inset-0 z-[160] flex items-center justify-center p-6 bg-black/80 backdrop-blur-md">
        <div class="bg-zinc-950 w-full max-w-md rounded-2xl border border-zinc-800 shadow-2xl overflow-hidden" @click.away="addPropModal.open = false">
            <div class="px-6 py-4 border-b border-zinc-900 bg-zinc-900/30 text-[10px] font-bold uppercase text-blue-500">Configure New Column</div>
            <div class="p-6 space-y-4">
                <input type="text" x-model="addPropModal.name" class="g-input !h-12" placeholder="Property Name">
                <select x-model="addPropModal.type" class="g-input !h-12">
                    <option value="string">String</option>
                    <option value="number">Number</option>
                    <option value="boolean">Boolean</option>
                </select>
                <input type="text" x-model="addPropModal.defaultValue" class="g-input !h-12" placeholder="Value">
            </div>
            <div class="px-6 py-4 border-t border-zinc-900 flex justify-end gap-3">
                <button @click="addPropModal.open = false" class="px-4 text-xs font-bold text-zinc-500">CANCEL</button>
                <button @click="confirmAddProperty()" class="btn-action btn-primary !px-6">CONFIRM</button>
            </div>
        </div>
    </div>

    <div x-show="importModal.open" x-cloak class="fixed inset-0 z-[150] flex items-center justify-center p-6 bg-black/80 backdrop-blur-md">
        <div class="bg-zinc-950 w-full max-w-2xl rounded-2xl border border-zinc-800 p-6 shadow-2xl" @click.away="importModal.open = false">
            <h3 class="text-blue-500 font-bold uppercase text-[10px] tracking-widest mb-4">Paste Database JSON</h3>
            <textarea x-model="importModal.text" class="g-input !h-80 p-4 font-mono text-[11px] leading-relaxed resize-none" placeholder='{"path/to/file": {"key": "val"}}'></textarea>
            <div class="flex justify-end gap-3 mt-4">
                <button @click="importModal.open = false" class="px-4 py-2 text-xs font-bold text-zinc-500 uppercase">Cancel</button>
                <button @click="processImport(importModal.text); importModal.open = false" class="btn-action btn-primary !px-8">Import</button>
            </div>
        </div>
    </div>

    <div x-show="errorSummary.open" x-cloak class="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-black/90 backdrop-blur-md">
        <div class="bg-zinc-950 w-full max-w-xl rounded-2xl border border-zinc-800 flex flex-col shadow-2xl max-h-[70vh]" @click.away="errorSummary.open = false">
            <div class="px-6 py-4 border-b border-zinc-900 flex justify-between items-center bg-red-900/10">
                <span class="text-xs font-bold uppercase text-red-500">Validation Errors</span>
                <button @click="errorSummary.open = false" class="text-zinc-500 hover:text-white"><i class="fa-solid fa-times"></i></button>
            </div>
            <div class="p-4 overflow-y-auto custom-scrollbar">
                <template x-for="err in errorList" :key="err.id + err.prop">
                    <div @click="goToError(err)" class="bg-zinc-900/50 border border-zinc-800 p-3 rounded-lg mb-2 cursor-pointer hover:border-blue-500/50">
                        <div class="flex justify-between text-[12px] font-bold text-zinc-200">
                            <span x-text="err.fileName"></span><span class="text-red-400 text-[10px]" x-text="err.issueType"></span>
                        </div>
                        <div class="text-[11px] text-zinc-500">Column: <span class="text-zinc-300" x-text="err.prop"></span> - Val: <span class="text-red-400" x-text="err.value"></span></div>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <script>
        function editor() {
            return {
                allFiles: [], folders: [], scripts: {}, classMap: {}, activeFolder: '', searchQuery: '',
                rootHandle: null, dirtyCount: 0, isSaving: false,
                blacklist: ['script', 'uid', 'format', 'load_steps', 'atlas', 'texture', 'sprite_frames', 'icon'],
                godotTypes: ['ExtResource', 'SubResource', 'Rect2', 'Vector2', 'Vector3', 'Color', 'Transform2D'],
                originalTypes: new Map(),
                errorSummary: { open: false },
                
                // MỞ RỘNG createModal ĐỂ HỖ TRỢ JSON SCHEMA
                createModal: { 
                    open: false, name: '', ext: '.tres', targetClone: '', cloneSearch: '',
                    jsonSchema: [], jsonNewPropName: '', jsonNewPropType: 'string'
                },

                addPropModal: { open: false, group: null, name: '', type: 'string', defaultValue: '' },
                importModal: { open: false, text: '' },
                multilineModal: { open: false, file: null, prop: '', text: '' },

                get errorList() {
                    const list = [];
                    this.allFiles.forEach(f => {
                        Object.keys(f.data).forEach(prop => {
                            if (this.hasIssue(f, prop)) list.push({ id: f.id, fileName: f.name, prop, value: f.data[prop], folder: f.folder, issueType: "Error" });
                        });
                    });
                    return list;
                },
                get errorCount() { return this.errorList.length; },
                get filteredTemplates() {
                    const q = this.createModal.cloneSearch.toLowerCase();
                    return this.allFiles.filter(f => f.type === 'tres' && (f.name.toLowerCase().includes(q) || f.scriptName.toLowerCase().includes(q))).slice(0, 8);
                },

                // NEW LOGIC: THÊM PROPERTY VÀO SCHEMA KHI TẠO JSON
                addJsonPropToSchema() {
                    if (!this.createModal.jsonNewPropName.trim()) return;
                    this.createModal.jsonSchema.push({
                        name: this.createModal.jsonNewPropName.trim(),
                        type: this.createModal.jsonNewPropType
                    });
                    this.createModal.jsonNewPropName = '';
                },

                async openProject() {
                    try { this.rootHandle = await window.showDirectoryPicker({ mode: 'readwrite' }); await this.loadProjectData(); } catch (e) { }
                },
                async reloadProject() {
                    if (this.dirtyCount > 0 && !confirm("Reload and discard changes?")) return;
                    await this.loadProjectData();
                },
                async loadProjectData() {
                    this.isSaving = true; this.allFiles = []; this.scripts = {}; this.classMap = {}; this.originalTypes.clear(); this.dirtyCount = 0;
                    try { await this.scanDir(this.rootHandle, ""); this.buildTree(); } finally { this.isSaving = false; }
                },
                async scanDir(handle, path) {
                    for await (const entry of handle.values()) {
                        const curPath = path + entry.name;
                        if (entry.kind === 'directory') await this.scanDir(entry, curPath + "/");
                        else {
                            const file = await entry.getFile(); const content = await file.text();
                            if (entry.name.endsWith('.gd')) this.parseGDScript(content, entry.name);
                            else if (entry.name.endsWith('.tres')) {
                                const { header, body } = this.splitTres(content);
                                const parsed = this.parseTresBody(body);
                                this.allFiles.push({ id: curPath, name: entry.name, path: curPath, folder: path.replace(/\/$/, "") || "root", handle: entry, data: parsed, type: 'tres', scriptName: this.getScriptNameFromTres(content), dirty: false, rawHeader: header, rawBody: body });
                                this.recordTypes(curPath, parsed);
                            } else if (entry.name.endsWith('.json')) {
                                try {
                                    const json = JSON.parse(content);
                                    for (let [id, val] of Object.entries(json)) {
                                        const eid = curPath + ":" + id;
                                        this.allFiles.push({ id: eid, name: id, path: curPath, folder: path.replace(/\/$/, "") || "root", handle: entry, data: val, type: 'json', scriptName: entry.name, dirty: false });
                                        this.recordTypes(eid, val);
                                    }
                                } catch (e) { }
                            }
                        }
                    }
                },
                recordTypes(id, data) {
                    const t = {}; Object.entries(data).forEach(([k, v]) => t[k] = typeof v);
                    this.originalTypes.set(id, t);
                },
                updateValue(file, prop, newValue) {
                    const t = this.originalTypes.get(file.id);
                    const target = t ? t[prop] : 'string';
                    if (target === 'number') file.data[prop] = newValue === "" ? 0 : (isNaN(newValue) ? newValue : Number(newValue));
                    else if (target === 'boolean') file.data[prop] = (newValue === 'true' || newValue === true);
                    else file.data[prop] = newValue;
                    this.markDirty(file);
                },
                openMultiline(file, prop) {
                    this.multilineModal = { open: true, file, prop, text: file.data[prop] };
                },
                saveMultiline() {
                    this.multilineModal.file.data[this.multilineModal.prop] = this.multilineModal.text;
                    this.markDirty(this.multilineModal.file);
                    this.multilineModal.open = false;
                },
                openAddPropModal(groupFiles) { this.addPropModal = { open: true, group: groupFiles, name: '', type: 'string', defaultValue: '' }; },
                confirmAddProperty() {
                    const { name, type, defaultValue, group } = this.addPropModal; if (!name) return;
                    let val = type === 'number' ? Number(defaultValue) || 0 : (type === 'boolean' ? (defaultValue === 'true') : String(defaultValue));
                    group.forEach(f => { if (!(name in f.data)) { f.data[name] = val; this.markDirty(f); this.recordTypes(f.id, f.data); } });
                    this.addPropModal.open = false;
                },
                hasIssue(file, prop) {
                    const v = file.data[prop]; const t = this.originalTypes.get(file.id);
                    return (!t || !t[prop]) ? false : (v === "" || v === null || (t[prop] === 'number' && isNaN(v)));
                },
                async saveDirtyFiles() {
                    if (this.dirtyCount === 0 || this.errorCount > 0) return; this.isSaving = true;
                    try {
                        const paths = [...new Set(this.allFiles.filter(f => f.dirty).map(f => f.path))];
                        for (let p of paths) {
                            const entries = this.allFiles.filter(f => f.path === p); const first = entries[0];
                            const w = await first.handle.createWritable();
                            if (first.type === 'tres') {
                                let lines = first.rawBody.split(/\r?\n/); let up = new Set();
                                let nl = lines.map(line => {
                                    const tr = line.trim();
                                    if (tr && tr.includes('=') && !tr.startsWith('[')) {
                                        const k = tr.split('=')[0].trim();
                                        if (first.data.hasOwnProperty(k)) {
                                            up.add(k); const v = first.data[k];
                                            let vStr = (typeof v === 'string' && !this.godotTypes.some(gt => v.startsWith(gt + "("))) ? `"${v}"` : v;
                                            return `${k} = ${vStr}`;
                                        }
                                    } return line;
                                });
                                Object.keys(first.data).forEach(k => { if (!up.has(k)) { 
                                    const v = first.data[k]; let vStr = (typeof v === 'string') ? `"${v}"` : v;
                                    nl.push(`${k} = ${vStr}`);
                                }});
                                await w.write(first.rawHeader + "\n" + nl.join('\n')); first.rawBody = nl.join('\n');
                            } else {
                                const json = {}; entries.forEach(e => json[e.name] = e.data);
                                await w.write(JSON.stringify(json, null, "\t"));
                            }
                            await w.close(); entries.forEach(e => e.dirty = false);
                        }
                        this.dirtyCount = 0;
                    } catch(e) { alert("Save failed!"); } finally { this.isSaving = false; }
                },
                openCreateModal() { 
                    this.createModal = { 
                        open: true, name: '', ext: '.tres', targetClone: '', cloneSearch: '',
                        jsonSchema: [], jsonNewPropName: '', jsonNewPropType: 'string'
                    }; 
                },
                async confirmCreateFile() { 
                    if (!this.createModal.name) return;
                    
                    // NẾU LÀ JSON, TẠO DỮ LIỆU MẪU TỪ SCHEMA
                    let initialData = {};
                    if (this.createModal.ext === '.json') {
                        this.createModal.jsonSchema.forEach(p => {
                            if (p.type === 'number') initialData[p.name] = 0;
                            else if (p.type === 'boolean') initialData[p.name] = false;
                            else initialData[p.name] = "";
                        });
                        await this.internalCreate(this.createModal.name, this.createModal.ext, null, initialData);
                    } else {
                        await this.internalCreate(this.createModal.name, this.createModal.ext, this.createModal.targetClone); 
                    }
                    
                    this.createModal.open = false; 
                },

                // UPDATE internalCreate ĐỂ NHẬN DỮ LIỆU BAN ĐẦU (DÀNH CHO JSON NEW)
                async internalCreate(name, ext, templateId = null, initialData = null) {
                    const fullName = name.endsWith(ext) ? name : name + ext;
                    let dir = this.rootHandle; if (this.activeFolder !== "root") for (let p of this.activeFolder.split('/')) dir = await dir.getDirectoryHandle(p);
                    const handle = await dir.getFileHandle(fullName, { create: true });
                    const path = (this.activeFolder === "root" ? "" : this.activeFolder + "/") + fullName;
                    
                    let data = {}, header = `[gd_resource type="Resource" format=3]\n\n[resource]`, body = "", sName = ext === '.tres' ? "Godot Resource" : fullName;
                    
                    if (ext === '.tres' && templateId) {
                        const src = this.allFiles.find(f => f.id === templateId);
                        if (src) { data = JSON.parse(JSON.stringify(src.data)); header = src.rawHeader; sName = src.scriptName; body = src.rawBody; }
                    } else if (ext === '.json' && initialData) {
                        // TẠO FILE JSON VỚI 1 ENTRY MẶC ĐỊNH LÀ 'default' ĐỂ DATABASE HIỂN THỊ ĐƯỢC
                        data = initialData;
                        const defaultEntryName = "new_entry_1";
                        const jsonPayload = {};
                        jsonPayload[defaultEntryName] = data;
                        
                        // LƯU FILE LUÔN
                        const w = await handle.createWritable();
                        await w.write(JSON.stringify(jsonPayload, null, "\t"));
                        await w.close();

                        // ADD VÀO LIST HIỆN TẠI
                        const eid = path + ":" + defaultEntryName;
                        const newFile = { id: eid, name: defaultEntryName, path, folder: this.activeFolder, handle, data: JSON.parse(JSON.stringify(data)), type: 'json', scriptName: fullName, dirty: false };
                        this.allFiles.push(newFile); this.recordTypes(eid, data);
                        this.buildTree();
                        return;
                    }

                    const newFile = { id: path, name: fullName, path, folder: this.activeFolder, handle, data, type: ext.replace('.',''), scriptName: sName, dirty: true, rawHeader: header, rawBody: body };
                    this.allFiles.push(newFile); this.recordTypes(path, data); this.dirtyCount++;
                    this.buildTree();
                },
                parseGDScript(c, f) {
                    const hints = {}, enums = {}, classNameMatch = c.match(/class_name\s+(\w+)/);
                    if (classNameMatch) this.classMap[classNameMatch[1]] = f;
                    const exMatch = c.match(/extends\s+(?:"res:\/\/([^"]+)"|(\w+))/);
                    let parent = exMatch ? (exMatch[1] ? exMatch[1].split('/').pop() : exMatch[2]) : null;
                    const enMatches = c.matchAll(/enum\s+(\w+)\s*\{([\s\S]+?)\}/g);
                    for (const m of enMatches) enums[m[1]] = m[2].split(',').map(v => v.trim().split('=')[0].trim()).filter(x => x);
                    c.split('\n').forEach(line => {
                        const l = line.trim(), varMatch = l.match(/var\s+(\w+)/); if (!varMatch) return; const varName = varMatch[1];
                        if (l.includes('@export_multiline')) hints[varName] = { type: 'multiline' };
                        else if (l.includes('@export_enum')) hints[varName] = { type: 'export_enum', options: l.match(/\(([\s\S]+?)\)/)[1].split(',').map(s => s.replace(/["']/g, "").trim()) };
                        else if (l.includes(': bool')) hints[varName] = { type: 'bool' };
                        else { for (let e in enums) { if (l.includes(`: ${e}`)) hints[varName] = { type: 'enum', options: enums[e] }; } }
                    });
                    this.scripts[f] = { hints, parent };
                },
                getScriptNameFromTres(c) {
                    const sr = c.match(/script\s*=\s*ExtResource\("([^"]+)"\)/); if (!sr) return "StaticResource";
                    return c.split('\n').find(l => l.includes(`id="${sr[1]}"`) && l.includes('.gd'))?.match(/path="res:\/\/([^"]+)"/)?.[1].split('/').pop() || "StaticResource";
                },
                splitTres(c) { const m = "[resource]", i = c.indexOf(m); return i === -1 ? { header: c, body: "" } : { header: c.substring(0, i + m.length), body: i === -1 ? "" : c.substring(i + m.length) }; },
                parseTresBody(b) {
                    const data = {}; b.split(/\r?\n/).forEach(l => {
                        const t = l.trim(); if (t && t.includes('=') && !t.startsWith('[')) {
                            const [k, ...v] = t.split('='); const key = k.trim(); let val = v.join('=').trim();
                            if (this.blacklist.includes(key.toLowerCase()) || this.godotTypes.some(gt => val.startsWith(gt + "("))) return;
                            if (val.startsWith('"') && val.endsWith('"')) val = val.substring(1, val.length - 1);
                            else if (val === "true") val = true; else if (val === "false") val = false; else if (!isNaN(val) && val !== "") val = Number(val);
                            data[key] = val;
                        }
                    }); return data;
                },
                getHint(f, p) {
                    let h = {}, cur = f.scriptName, s = 0;
                    while (cur && s < 10) { let si = this.scripts[cur] || this.scripts[this.classMap[cur]]; if (!si) break; h = { ...si.hints, ...h }; cur = si.parent; s++; }
                    return h[p] || { type: 'default' };
                },
                getFieldType(f, p) { const h = this.getHint(f, p); return h.type !== 'default' ? h.type : (typeof f.data[p] === 'boolean' ? 'bool' : 'default'); },
                getFieldsForGroup(s, f) { let k = new Set(); f.forEach(x => Object.keys(x.data).forEach(y => k.add(y))); return Array.from(k); },
                get groupedFiles() {
                    let f = this.searchQuery ? this.allFiles.filter(x => x.name.toLowerCase().includes(this.searchQuery.toLowerCase())) : this.allFiles.filter(x => x.folder === this.activeFolder);
                    const groups = {}; f.forEach(x => { if (!groups[x.scriptName]) groups[x.scriptName] = []; groups[x.scriptName].push(x); }); return groups;
                },
                buildTree() {
                    const ps = [...new Set(this.allFiles.map(x => x.folder))];
                    this.folders = ps.sort().map(p => ({ name: p === "root" ? 'Resources' : p.split('/').pop(), fullPath: p, level: p === "root" ? 0 : p.split('/').length }));
                    if (this.folders.length > 0 && !this.activeFolder) this.activeFolder = this.folders[0].fullPath;
                },
                markDirty(f) { if (!f.dirty) { f.dirty = true; this.dirtyCount++; } },
                addNewEntry(g, s) {
                    const f = g[0], id = prompt("Identifier:"); if (!id) return;
                    if (f.type === 'json') {
                        const ed = {}; Object.keys(f.data).forEach(k => { const v = f.data[k]; ed[k] = (typeof v === 'boolean' ? false : (typeof v === 'number' ? 0 : "")); });
                        const n = { ...f, id: f.path + ":" + id, name: id, data: ed, dirty: true }; this.allFiles.push(n); this.recordTypes(n.id, n.data); this.dirtyCount++;
                    } else this.internalCreate(id, '.tres', f.id);
                },
                async deleteEntry(f) {
                    if (!confirm("Delete?")) return;
                    if (f.type === 'tres') { await f.handle.remove(); this.allFiles = this.allFiles.filter(x => x.id !== f.id); }
                    else { const p = f.path; this.allFiles = this.allFiles.filter(x => x.id !== f.id); this.allFiles.filter(x => x.path === p).forEach(x => this.markDirty(x)); }
                    this.buildTree();
                },
                exportAllData() {
                    const b = {}; this.allFiles.forEach(f => b[f.id] = f.data);
                    const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(b, null, 2)], {type:'application/json'}));
                    a.download = `database_export.json`; a.click();
                },
                async importData() {
                    const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
                    input.onchange = async (e) => { this.processImport(await e.target.files[0].text()); }; input.click();
                },
                processImport(jsonStr) {
                    try {
                        const imported = JSON.parse(jsonStr); let count = 0;
                        this.allFiles.forEach(f => { if (imported[f.id]) { f.data = imported[f.id]; this.markDirty(f); count++; } });
                        alert(`Synced ${count} items.`);
                    } catch (e) { alert("Invalid JSON"); }
                },
                getFolderErrorCount(path) { return this.allFiles.filter(f => f.folder === path && Object.keys(f.data).some(p => this.hasIssue(f, p))).length; },
                goToError(err) { this.activeFolder = err.folder; this.searchQuery = err.fileName; this.errorSummary.open = false; }
            }
        }
    </script>
