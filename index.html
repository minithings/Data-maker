<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Database Game Maker v3.3 - All Features Restored</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg-main: #09090b; --bg-side: #09090b; --bg-panel: #121217; --bg-input: #000000; --accent: #3b82f6; --border: #27272a; --text-main: #f4f4f5; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); color: var(--text-main); overflow: hidden; letter-spacing: -0.01em; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        .g-table-row td { height: 58px; vertical-align: middle; border-bottom: 1px solid var(--border); }
        .g-input { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-main); padding: 0 12px; border-radius: 8px; font-size: 13px; outline: none; width: 100%; height: 38px; transition: all 0.2s; }
        .g-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1); }
        .input-error { border-color: #ef4444 !important; background-color: rgba(239, 68, 68, 0.05) !important; color: #f87171 !important; }
        .sidebar-active { background: rgba(59, 130, 246, 0.1); color: #60a5fa !important; }
        .data-panel { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 24px; overflow: hidden; }
        [x-cloak] { display: none !important; }
        .btn-action { font-size: 11px; padding: 6px 14px; border-radius: 8px; background: #18181b; border: 1px solid #27272a; color: #a1a1aa; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; font-weight: 600; }
        .btn-action:hover { background: #27272a; color: white; }
        .btn-primary { background: #2563eb; color: white; border: none; }
        .btn-primary:hover { background: #3b82f6; }
        .dirty-row { border-left: 3px solid #f59e0b !important; }
    </style>
</head>

<body x-data="editor()" @keydown.window.prevent.ctrl.s="saveDirtyFiles()" class="h-screen flex flex-col">

    <div x-show="isSaving" x-cloak class="fixed inset-0 bg-black/80 z-[100] flex flex-col items-center justify-center backdrop-blur-sm">
        <div class="w-10 h-10 border-2 border-white/20 border-t-white rounded-full animate-spin"></div>
        <p class="mt-4 text-[10px] font-bold uppercase tracking-widest text-zinc-400">Processing Changes...</p>
    </div>

    <!-- NAVBAR -->
    <nav class="h-14 border-b border-zinc-800 bg-zinc-950 flex items-center justify-between px-4 z-30">
        <div class="flex items-center gap-4">
            <h1 class="text-xs font-bold uppercase tracking-tighter">Data Maker <span class="text-blue-500 font-black">V3.3</span></h1>
            <button @click="openProject()" class="btn-action !py-1.5"><i class="fa-solid fa-folder-open text-blue-500"></i> Open</button>
            <button @click="reloadProject()" class="btn-action !py-1.5" :disabled="!rootHandle" :class="!rootHandle && 'opacity-20'"><i class="fa-solid fa-rotate text-green-500"></i> Reload</button>
            <div class="h-4 w-[1px] bg-zinc-800 mx-1"></div>
            <button @click="exportAllData()" class="btn-action !py-1.5"><i class="fa-solid fa-file-export text-orange-400"></i> Export JSON</button>
            <button @click="importData()" class="btn-action !py-1.5"><i class="fa-solid fa-file-import text-green-400"></i> Import Sync</button>
        </div>
        <div class="flex items-center gap-4">
            <div class="text-[10px] font-bold text-red-500 bg-red-500/10 px-3 py-1 rounded-full border border-red-500/20" x-show="errorCount > 0">
                <i class="fa-solid fa-triangle-exclamation mr-1"></i> <span x-text="errorCount"></span> INVALID
            </div>
            <input type="text" x-model="searchQuery" placeholder="Filter identifiers..." class="g-input !w-64">
            <button @click="saveDirtyFiles()" :disabled="dirtyCount === 0 || errorCount > 0" :class="(dirtyCount > 0 && errorCount === 0) ? 'btn-primary' : 'opacity-30 cursor-not-allowed'" class="btn-action px-8 uppercase tracking-widest transition-all">
                Sync (<span x-text="dirtyCount"></span>)
            </button>
        </div>
    </nav>

    <div class="flex-1 flex overflow-hidden">
        <!-- SIDEBAR -->
        <aside class="w-64 bg-zinc-950 flex flex-col border-r border-zinc-900 shrink-0">
            <div class="p-4"><button @click="openCreateModal()" class="btn-action btn-primary w-full justify-center"><i class="fa-solid fa-plus-circle"></i> New Resource</button></div>
            <div class="flex-1 overflow-y-auto custom-scrollbar">
                <template x-for="folder in folders" :key="folder.fullPath">
                    <div @click="activeFolder = folder.fullPath" 
                         :style="'padding-left: ' + (folder.level * 12 + 16) + 'px'" 
                         :class="activeFolder === folder.fullPath ? 'sidebar-active' : 'text-zinc-500 hover:text-zinc-300'" 
                         class="py-2.5 px-3 cursor-pointer text-[13px] font-medium truncate flex items-center gap-2">
                        <i class="fa-solid fa-folder text-[11px] opacity-40"></i> <span x-text="folder.name"></span>
                    </div>
                </template>
            </div>
        </aside>

        <!-- MAIN TABLE -->
        <main class="flex-1 bg-zinc-950 overflow-y-auto custom-scrollbar p-6">
            <template x-for="(groupFiles, scriptName) in groupedFiles" :key="scriptName">
                <div class="data-panel shadow-2xl">
                    <div class="px-5 py-3 border-b border-zinc-800 bg-zinc-900/20 flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <span class="text-[11px] font-bold uppercase tracking-widest text-zinc-400" x-text="scriptName"></span>
                            <button @click="addNewEntry(groupFiles, scriptName)" class="btn-action !py-1 !px-3"><i class="fa-solid fa-plus text-blue-500"></i> New Entry</button>
                            <template x-if="groupFiles[0].type === 'json'">
                                <button @click="openAddPropModal(groupFiles)" class="btn-action !py-1 !px-3"><i class="fa-solid fa-columns text-zinc-500"></i> Add Column</button>
                            </template>
                        </div>
                    </div>
                    <div class="overflow-x-auto custom-scrollbar">
                        <table class="w-full text-left border-separate border-spacing-0">
                            <thead>
                                <tr class="bg-zinc-900/30">
                                    <th class="px-6 py-3 border-b border-zinc-800 text-[10px] font-bold text-zinc-500 uppercase">Identifier</th>
                                    <template x-for="prop in getFieldsForGroup(scriptName, groupFiles)">
                                        <th class="px-4 py-3 border-b border-zinc-800 text-[10px] font-bold text-zinc-600 uppercase" x-text="prop"></th>
                                    </template>
                                    <th class="px-4 py-3 border-b border-zinc-800 w-[60px]"></th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="file in groupFiles" :key="file.id">
                                    <tr class="g-table-row group transition-all" :class="file.dirty && 'dirty-row'">
                                        <td class="px-6 min-w-[200px]"><span class="text-[13px] font-semibold text-zinc-300" x-text="file.name"></span></td>
                                        <template x-for="prop in getFieldsForGroup(scriptName, groupFiles)">
                                            <td class="px-2">
                                                <div class="flex items-center gap-1 group/field">
                                                    <template x-if="typeof file.data[prop] === 'boolean'">
                                                        <button @click="file.data[prop] = !file.data[prop]; markDirty(file)" 
                                                                :class="file.data[prop] ? 'bg-green-600' : 'bg-zinc-800'" class="w-9 h-5 rounded-full px-0.5 flex items-center transition-all">
                                                            <div :class="file.data[prop] ? 'translate-x-4' : 'translate-x-0'" class="w-4 h-4 bg-white rounded-full transition-all"></div>
                                                        </button>
                                                    </template>
                                                    <template x-if="typeof file.data[prop] !== 'boolean'">
                                                        <div class="relative flex-1">
                                                            <input type="text" x-model="file.data[prop]" @input="markDirty(file)" 
                                                                :class="isInvalid(file, prop) && 'input-error'"
                                                                class="g-input pr-8">
                                                            <div x-show="isInvalid(file, prop)" class="absolute right-8 top-1/2 -translate-y-1/2 text-red-500">
                                                                <i class="fa-solid fa-circle-exclamation text-[12px]"></i>
                                                            </div>
                                                            <button @click="openTextEditor(file, prop)" class="absolute right-2 top-1/2 -translate-y-1/2 text-zinc-600 hover:text-blue-400 opacity-0 group-hover/field:opacity-100 transition-opacity">
                                                                <i class="fa-solid fa-expand text-[10px]"></i>
                                                            </button>
                                                        </div>
                                                    </template>
                                                </div>
                                            </td>
                                        </template>
                                        <td class="px-2 text-center">
                                            <button @click="deleteEntry(file)" class="btn-delete text-zinc-600 hover:text-red-500 transition-colors"><i class="fa-solid fa-trash-can"></i></button>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
            </template>
        </main>
    </div>

    <!-- MODAL: NEW RESOURCE (CLONE SUPPORT) -->
    <div x-show="createModal.open" x-cloak class="fixed inset-0 z-[110] flex items-center justify-center p-6 bg-black/80 backdrop-blur-md">
        <div class="bg-zinc-950 w-full max-w-lg rounded-2xl border border-zinc-800 p-6 space-y-4 shadow-2xl">
            <h3 class="text-blue-500 font-bold uppercase text-[10px] tracking-widest">Create New Resource</h3>
            <input type="text" x-model="createModal.name" class="g-input !h-12" placeholder="Resource Name...">
            <div class="grid grid-cols-2 gap-4">
                <button @click="createModal.ext = '.tres'" :class="createModal.ext === '.tres' ? 'border-blue-500 bg-blue-500/10 text-blue-400' : 'border-zinc-800'" class="border p-4 rounded-xl transition-all font-bold">.tres</button>
                <button @click="createModal.ext = '.json'" :class="createModal.ext === '.json' ? 'border-blue-500 bg-blue-500/10 text-blue-400' : 'border-zinc-800'" class="border p-4 rounded-xl transition-all font-bold">.json</button>
            </div>
            
            <template x-if="createModal.ext === '.tres'">
                <div class="pt-3 space-y-2">
                    <label class="text-[10px] font-bold text-zinc-500 uppercase">Clone Template (Optional)</label>
                    <div class="h-40 overflow-y-auto custom-scrollbar border border-zinc-900 rounded-lg p-1 bg-zinc-900/30">
                        <div @click="createModal.targetClone = ''" :class="!createModal.targetClone ? 'bg-blue-600 text-white' : ''" class="p-2 rounded text-[12px] cursor-pointer hover:bg-white/5 mb-1 italic">-- Empty Resource --</div>
                        <template x-for="f in allFiles.filter(f => f.type === 'tres')" :key="f.id">
                            <div @click="createModal.targetClone = f.id" :class="createModal.targetClone === f.id ? 'bg-blue-600 text-white' : ''" class="p-2 rounded text-[12px] cursor-pointer hover:bg-white/5 truncate" x-text="f.name"></div>
                        </template>
                    </div>
                </div>
            </template>

            <div class="flex justify-end gap-3 pt-4 border-t border-zinc-900">
                <button @click="createModal.open = false" class="px-4 py-2 text-xs font-bold text-zinc-500 uppercase">Cancel</button>
                <button @click="confirmCreateFile()" class="btn-action btn-primary !px-8">Create</button>
            </div>
        </div>
    </div>

    <!-- MODAL: ADD COLUMN (JSON) -->
    <div x-show="addPropModal.open" x-cloak class="fixed inset-0 z-[120] flex items-center justify-center p-6 bg-black/80 backdrop-blur-md">
        <div class="bg-zinc-950 w-full max-w-md rounded-2xl border border-zinc-800 p-6 space-y-4" @click.away="addPropModal.open = false">
            <h3 class="text-xs font-bold uppercase text-blue-500">Add New Column</h3>
            <div class="space-y-3">
                <input type="text" x-model="addPropModal.name" class="g-input" placeholder="Property Name">
                <select x-model="addPropModal.type" class="g-input">
                    <option value="string">String</option><option value="number">Number</option><option value="boolean">Boolean</option>
                </select>
                <input type="text" x-model="addPropModal.defaultValue" class="g-input" placeholder="Default Value">
            </div>
            <div class="flex justify-end gap-3 pt-2"><button @click="confirmAddProperty()" class="btn-action btn-primary">Add Column</button></div>
        </div>
    </div>

    <!-- MODAL: TEXT EDITOR -->
    <div x-show="textEditor.open" x-cloak class="fixed inset-0 z-[120] flex items-center justify-center p-6 bg-black/90 backdrop-blur-md">
        <div class="bg-zinc-950 w-full max-w-4xl rounded-2xl border border-zinc-800 flex flex-col shadow-2xl overflow-hidden" @click.away="closeTextEditor()">
            <div class="px-6 py-4 border-b border-zinc-900 flex justify-between bg-zinc-900/30">
                <span class="text-xs font-bold uppercase text-zinc-400">Editing: <span class="text-blue-500" x-text="textEditor.key"></span></span>
                <button @click="closeTextEditor()"><i class="fa-solid fa-times"></i></button>
            </div>
            <textarea x-model="textEditor.tempValue" class="flex-1 bg-transparent p-6 text-zinc-300 outline-none font-mono text-sm leading-relaxed custom-scrollbar min-h-[400px]"></textarea>
            <div class="px-6 py-4 border-t border-zinc-900 flex justify-end gap-3 bg-zinc-900/10"><button @click="saveTextEditor()" class="btn-action btn-primary !px-10">Save</button></div>
        </div>
    </div>

    <script>
        function editor() {
            return {
                allFiles: [], folders: [], activeFolder: '', searchQuery: '', rootHandle: null,
                dirtyCount: 0, errorCount: 0, isSaving: false,
                blacklist: ['script', 'uid', 'type', 'format', 'load_steps', 'atlas', 'texture', 'sprite_frames', 'icon'],
                godotTypes: ['ExtResource', 'SubResource', 'Rect2', 'Vector2', 'Vector3', 'Color', 'Transform2D'],
                originalTypes: new Map(),
                createModal: { open: false, name: '', ext: '.tres', targetClone: '' },
                textEditor: { open: false, file: null, key: '', tempValue: '' },
                addPropModal: { open: false, group: null, name: '', type: 'string', defaultValue: '' },

                async openProject() {
                    try { this.rootHandle = await window.showDirectoryPicker({ mode: 'readwrite' }); await this.loadProjectData(); } catch (e) { }
                },
                async reloadProject() {
                    if (this.dirtyCount > 0 && !confirm("Reload sẽ mất dữ liệu chưa lưu?")) return;
                    await this.loadProjectData();
                },
                async loadProjectData() {
                    this.isSaving = true; this.allFiles = []; this.originalTypes.clear(); this.dirtyCount = 0; this.errorCount = 0;
                    try { await this.scanDir(this.rootHandle, ""); this.buildTree(); } finally { this.isSaving = false; }
                },
                async scanDir(handle, path) {
                    for await (const entry of handle.values()) {
                        const curPath = path + entry.name;
                        if (entry.kind === 'directory') await this.scanDir(entry, curPath + "/");
                        else {
                            const file = await entry.getFile(); const content = await file.text();
                            if (entry.name.endsWith('.tres')) {
                                const { header, body } = this.splitTres(content);
                                const parsed = this.parseTresBody(body);
                                this.allFiles.push({ id: curPath, name: entry.name, path: curPath, folder: path.replace(/\/$/, "") || "root", handle: entry, data: parsed, type: 'tres', scriptName: "Godot Resource", dirty: false, rawHeader: header });
                                this.recordTypes(curPath, parsed);
                            } else if (entry.name.endsWith('.json')) {
                                try {
                                    const json = JSON.parse(content);
                                    for (let [id, val] of Object.entries(json)) {
                                        const entryId = curPath + ":" + id;
                                        this.allFiles.push({ id: entryId, name: id, path: curPath, folder: path.replace(/\/$/, "") || "root", handle: entry, data: val, type: 'json', scriptName: entry.name, dirty: false });
                                        this.recordTypes(entryId, val);
                                    }
                                } catch (e) { }
                            }
                        }
                    }
                },
                splitTres(content) {
                    const marker = "[resource]"; const index = content.indexOf(marker);
                    if (index === -1) return { header: content, body: "" };
                    return { header: content.substring(0, index + marker.length), body: content.substring(index + marker.length) };
                },
                parseTresBody(bodyText) {
                    const data = {};
                    bodyText.split(/\r?\n/).forEach(line => {
                        const t = line.trim();
                        if (t && t.includes('=') && !t.startsWith('[')) {
                            const [k, ...v] = t.split('='); const key = k.trim(); let val = v.join('=').trim();
                            if (val.startsWith('"') && val.endsWith('"')) val = val.substring(1, val.length - 1);
                            else if (val === "true") val = true; else if (val === "false") val = false;
                            else if (!isNaN(val) && val !== "") val = Number(val);
                            data[key] = val;
                        }
                    });
                    return data;
                },
                recordTypes(id, data) {
                    const types = {}; Object.entries(data).forEach(([k, v]) => types[k] = typeof v);
                    this.originalTypes.set(id, types);
                },
                isInvalid(file, prop) {
                    const val = file.data[prop]; const types = this.originalTypes.get(file.id);
                    if (!types || !types[prop]) return false;
                    return (types[prop] === 'number') && (isNaN(val) || val === "" || val === null);
                },
                checkGlobalErrors() {
                    let count = 0; this.allFiles.forEach(f => {
                        Object.keys(f.data).forEach(p => { if (this.isInvalid(f, p)) count++; });
                    });
                    this.errorCount = count;
                },
                isProtected(key, value) {
                    if (this.blacklist.includes(key.toLowerCase())) return true;
                    if (typeof value === 'string') return this.godotTypes.some(t => value.startsWith(t + "("));
                    return false;
                },
                getFieldsForGroup(script, files) {
                    let keys = new Set();
                    files.forEach(f => { Object.entries(f.data).forEach(([k, v]) => { if (!this.isProtected(k, v)) keys.add(k); }); });
                    return Array.from(keys);
                },
                openTextEditor(file, key) { this.textEditor = { open: true, file, key, tempValue: file.data[key] }; },
                saveTextEditor() {
                    if (this.textEditor.file.data[this.textEditor.key] !== this.textEditor.tempValue) {
                        this.textEditor.file.data[this.textEditor.key] = this.textEditor.tempValue;
                        this.markDirty(this.textEditor.file);
                    }
                    this.closeTextEditor();
                },
                closeTextEditor() { this.textEditor.open = false; },
                openAddPropModal(g) { this.addPropModal = { open: true, group: g, name: '', type: 'string', defaultValue: '' }; },
                confirmAddProperty() {
                    const { name, type, defaultValue, group } = this.addPropModal;
                    if (!name) return;
                    let val = type === 'number' ? Number(defaultValue) : (type === 'boolean' ? (defaultValue === 'true') : String(defaultValue));
                    group.forEach(f => { if (!(name in f.data)) { f.data[name] = val; this.markDirty(f); let types = this.originalTypes.get(f.id) || {}; types[name] = typeof val; this.originalTypes.set(f.id, types); } });
                    this.addPropModal.open = false;
                },
                async saveDirtyFiles() {
                    if (this.dirtyCount === 0 || this.errorCount > 0) return;
                    this.isSaving = true;
                    try {
                        const paths = [...new Set(this.allFiles.filter(f => f.dirty).map(f => f.path))];
                        for (let p of paths) {
                            const entries = this.allFiles.filter(f => f.path === p); const first = entries[0];
                            const w = await first.handle.createWritable();
                            if (first.type === 'tres') {
                                let content = first.rawHeader + "\n";
                                for (const [k, v] of Object.entries(first.data)) {
                                    let valStr = (typeof v === 'string' && !this.godotTypes.some(t => v.startsWith(t + "("))) ? `"${v}"` : v;
                                    content += `${k} = ${valStr}\n`;
                                }
                                await w.write(content);
                            } else {
                                const json = {}; entries.forEach(e => json[e.name] = e.data);
                                await w.write(JSON.stringify(json, null, "\t"));
                            }
                            await w.close(); entries.forEach(e => e.dirty = false);
                        }
                        this.dirtyCount = 0;
                    } catch (e) { alert(e.message); } finally { this.isSaving = false; }
                },
                async importData() {
                    if (!this.rootHandle) return;
                    const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
                    input.onchange = async (e) => {
                        const imported = JSON.parse(await e.target.files[0].text());
                        const fileMap = new Map(); this.allFiles.forEach(f => { fileMap.set(f.id, f); fileMap.set(f.name, f); });
                        let changed = 0;
                        for (const [key, valObj] of Object.entries(imported)) {
                            const target = fileMap.get(key);
                            if (target) {
                                let hasLocal = false;
                                for (const p in valObj) { if (!this.isProtected(p, target.data[p])) { if (JSON.stringify(target.data[p]) !== JSON.stringify(valObj[p])) { target.data[p] = valObj[p]; hasLocal = true; } } }
                                if (hasLocal) { this.markDirty(target); changed++; }
                            }
                        }
                        alert(`Sync Success: ${changed} items.`);
                    };
                    input.click();
                },
                exportAllData() {
                    const bundle = {}; this.allFiles.forEach(f => { const clean = {}; for (const [k, v] of Object.entries(f.data)) { if (!this.isProtected(k, v)) clean[k] = v; } bundle[f.id] = clean; });
                    const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(bundle, null, 2)], {type:'application/json'}));
                    a.download = `db_bundle.json`; a.click();
                },
                buildTree() {
                    const paths = [...new Set(this.allFiles.map(f => f.folder))];
                    this.folders = paths.sort().map(p => ({ name: p === "root" ? 'Root' : p.split('/').pop(), fullPath: p, level: p === "root" ? 0 : p.split('/').length }));
                    this.activeFolder = this.folders[0]?.fullPath || '';
                },
                get groupedFiles() {
                    let f = this.searchQuery ? this.allFiles.filter(f => f.name.toLowerCase().includes(this.searchQuery.toLowerCase())) : this.allFiles.filter(f => f.folder === this.activeFolder);
                    const groups = {}; f.forEach(x => { if (!groups[x.scriptName]) groups[x.scriptName] = []; groups[x.scriptName].push(x); });
                    return groups;
                },
                markDirty(f) { if (!f.dirty) { f.dirty = true; this.dirtyCount++; } this.checkGlobalErrors(); },
                async deleteEntry(file) {
                    if (!confirm("Delete?")) return;
                    if (file.type === 'tres') { await file.handle.remove(); this.allFiles = this.allFiles.filter(f => f.id !== file.id); }
                    else { const p = file.path; this.allFiles = this.allFiles.filter(f => f.id !== file.id); this.allFiles.filter(f => f.path === p).forEach(f => this.markDirty(f)); }
                    this.buildTree(); this.checkGlobalErrors();
                },
                addNewEntry(group, scriptName) {
                    const first = group[0];
                    if (first.type === 'json') {
                        const id = prompt("ID:");
                        if (id) {
                            const newObj = { ...first, id: first.path + ":" + id, name: id, data: JSON.parse(JSON.stringify(first.data)), dirty: true };
                            this.allFiles.push(newObj); this.recordTypes(newObj.id, newObj.data); this.dirtyCount++;
                        }
                    } else { const name = prompt("Name:"); if (name) this.internalCreate(name, '.tres', first.id); }
                },
                openCreateModal() { this.createModal = { open: true, name: '', ext: '.tres', targetClone: '' }; },
                async confirmCreateFile() { if (this.createModal.name) await this.internalCreate(this.createModal.name, this.createModal.ext, this.createModal.targetClone); this.createModal.open = false; },
                async internalCreate(name, ext, templateId = null) {
                    const fullName = name.endsWith(ext) ? name : name + ext;
                    let dir = this.rootHandle; if (this.activeFolder !== "root") for (let p of this.activeFolder.split('/')) dir = await dir.getDirectoryHandle(p);
                    const handle = await dir.getFileHandle(fullName, { create: true });
                    const path = (this.activeFolder === "root" ? "" : this.activeFolder + "/") + fullName;
                    let data = {}; let header = `[gd_resource type="Resource" format=3]\n\n[resource]`;
                    if (ext === '.tres' && templateId) {
                        const src = this.allFiles.find(f => f.id === templateId);
                        if (src) { data = JSON.parse(JSON.stringify(src.data)); header = src.rawHeader; }
                    }
                    const newFile = { id: path, name: fullName, path, folder: this.activeFolder, handle, data, type: ext.replace('.',''), scriptName: ext === '.tres' ? "Godot Resource" : fullName, dirty: true, rawHeader: header };
                    this.allFiles.push(newFile); this.recordTypes(path, data); this.dirtyCount++;
                }
            }
        }
    </script>
</body>
