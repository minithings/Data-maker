<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Database Maker v1.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-main: #09090b;
            --bg-side: #09090b;
            --bg-panel: #121217;
            --bg-input: #000000;
            --accent: #3b82f6;
            --border: #27272a;
            --text-main: #f4f4f5;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            overflow: hidden;
            letter-spacing: -0.01em;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #27272a;
            border-radius: 10px;
        }

        .g-table-row td {
            height: 58px;
            vertical-align: middle;
            border-bottom: 1px solid var(--border);
        }

        .g-input {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0 12px;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
            width: 100%;
            height: 38px;
            transition: all 0.2s;
        }

        .g-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1);
        }

        .input-error {
            border-color: #ef4444 !important;
            background-color: rgba(239, 68, 68, 0.05) !important;
            color: #f87171 !important;
        }

        .input-warning {
            border-color: #f59e0b !important;
            background-color: rgba(245, 158, 11, 0.05) !important;
            color: #fbbf24 !important;
        }

        .sidebar-active {
            background: rgba(59, 130, 246, 0.1);
            color: #60a5fa !important;
        }

        .data-panel {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 24px;
            overflow: hidden;
        }

        [x-cloak] {
            display: none !important;
        }

        .btn-action {
            font-size: 11px;
            padding: 6px 14px;
            border-radius: 8px;
            background: #18181b;
            border: 1px solid #27272a;
            color: #a1a1aa;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .btn-action:hover {
            background: #27272a;
            color: white;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background: #3b82f6;
        }

        .dirty-row {
            border-left: 3px solid #f59e0b !important;
        }

        .col-id {
            width: 220px;
            min-width: 220px;
            position: sticky;
            left: 0;
            z-index: 20;
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
        }

        .type-number {
            color: #60a5fa !important;
            font-family: 'JetBrains Mono', monospace;
        }

        .shake-error {
            animation: shake 0.5s cubic-bezier(.36, .07, .19, .97) both;
        }

        @keyframes shake {

            10%,
            90% {
                transform: translate3d(-1px, 0, 0);
            }

            20%,
            80% {
                transform: translate3d(2px, 0, 0);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-2px, 0, 0);
            }

            40%,
            60% {
                transform: translate3d(2px, 0, 0);
            }
        }

        aside {
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s;
        }

        .grab-scroll {
            cursor: grab;
            user-select: none;
        }

        .grab-scroll:active {
            cursor: grabbing;
        }
    </style>
</head>

<body x-data="editor()" @keydown.window.prevent.ctrl.s="saveDirtyFiles()" class="h-screen flex flex-col">

    <div x-show="isSaving" x-cloak
        class="fixed inset-0 bg-black/80 z-[200] flex flex-col items-center justify-center backdrop-blur-sm font-mono text-xs">
        <div class="w-10 h-10 border-2 border-white/20 border-t-white rounded-full animate-spin"></div>
        <p class="mt-4 text-zinc-400 uppercase tracking-widest">Processing (Scanning files)...</p>
    </div>

    <nav class="h-14 border-b border-zinc-800 bg-zinc-950 flex items-center justify-between px-4 z-30">
        <div class="flex items-center gap-4">
            <button @click="sidebarOpen = !sidebarOpen"
                class="text-zinc-500 hover:text-white transition-colors w-8 h-8 flex items-center justify-center rounded-lg hover:bg-zinc-900">
                <i class="fa-solid" :class="sidebarOpen ? 'fa-indent' : 'fa-bars'"></i>
            </button>
            <h1 class="text-xs font-bold uppercase tracking-tighter">Data Maker <span
                    class="text-blue-500 font-black">V1.2</span></h1>

            <button @click="openProject()" class="btn-action"><i class="fa-solid fa-folder-open text-blue-500"></i>
                Open</button>
            <button x-show="canRestore" @click="restoreLastProject()"
                class="btn-action bg-blue-900/20 border-blue-500/30 text-blue-400">
                <i class="fa-solid fa-clock-rotate-left"></i> Restore: <span x-text="savedName"></span>
            </button>

            <button @click="reloadProject()" class="btn-action" :disabled="!rootHandle"
                :class="!rootHandle && 'opacity-20'"><i class="fa-solid fa-rotate text-green-500"></i> Reload</button>
            <div class="h-4 w-[1px] bg-zinc-800 mx-1"></div>
            <button @click="exportAllData()" class="btn-action"><i class="fa-solid fa-file-export text-orange-400"></i>
                Export</button>
            <div class="flex items-center bg-zinc-900 rounded-lg p-0.5 border border-zinc-800">
                <button @click="importData()" class="btn-action !border-none !bg-transparent px-3"
                    title="Import from File"><i class="fa-solid fa-file-import text-green-400"></i></button>
                <div class="w-[1px] h-3 bg-zinc-800"></div>
                <button @click="importModal.open = true" class="btn-action !border-none !bg-transparent px-3"
                    title="Paste JSON string"><i class="fa-solid fa-paste text-blue-400"></i> Paste JSON</button>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <button @click="errorSummary.open = true"
                class="text-[10px] font-bold text-red-500 bg-red-500/10 px-3 py-2 rounded-lg border border-red-500/20"
                x-show="errorCount > 0">
                <i class="fa-solid fa-triangle-exclamation mr-1"></i> <span x-text="errorCount"></span> ISSUES
            </button>
            <input type="text" x-model="searchQuery" placeholder="Search..." class="g-input !w-64">
            <button @click="saveDirtyFiles()" :disabled="dirtyCount === 0 || errorCount > 0"
                :class="(dirtyCount > 0 && errorCount === 0) ? 'btn-primary' : 'opacity-30'"
                class="btn-action px-8 uppercase tracking-widest">
                Sync (<span x-text="dirtyCount"></span>)
            </button>
        </div>
    </nav>

    <div class="flex-1 flex overflow-hidden">
        <aside :class="sidebarOpen ? 'w-64 opacity-100' : 'w-0 opacity-0 pointer-events-none'"
            class="bg-zinc-950 flex flex-col border-r border-zinc-900 shrink-0 overflow-hidden">
            <div class="p-4" x-show="rootHandle" x-cloak>
                <button @click="openCreateModal()" class="btn-action btn-primary w-full justify-center"><i
                        class="fa-solid fa-plus-circle"></i> New Resource</button>
            </div>
            <div class="flex-1 overflow-y-auto custom-scrollbar border-t border-zinc-900">
                <template x-for="folder in folders" :key="folder.fullPath">
                    <div @click="activeFolder = folder.fullPath; searchQuery = ''"
                        :style="'padding-left: ' + (folder.level * 12 + 16) + 'px'"
                        :class="activeFolder === folder.fullPath && !searchQuery ? 'sidebar-active' : 'text-zinc-500 hover:text-zinc-300'"
                        class="py-2.5 px-3 cursor-pointer text-[13px] font-medium truncate flex items-center justify-between group transition-colors">
                        <div class="flex items-center gap-2 overflow-hidden">
                            <i class="fa-solid fa-folder text-[11px] opacity-40"></i>
                            <span class="truncate" x-text="folder.name"></span>
                        </div>
                        <span x-show="getFolderErrorCount(folder.fullPath) > 0"
                            class="bg-red-600 text-white text-[9px] font-black px-1.5 py-0.5 rounded-full min-w-[18px] text-center"
                            x-text="getFolderErrorCount(folder.fullPath)"></span>
                    </div>
                </template>
            </div>
        </aside>

        <main class="flex-1 bg-zinc-950 overflow-y-auto custom-scrollbar p-6">
            <template x-for="(groupFiles, scriptName) in groupedFiles" :key="scriptName">
                <div class="data-panel shadow-2xl" x-data="{ isDown: false, startX: 0, scrollLeft: 0 }"
                    @mouseup="isDown = false" @mouseleave="isDown = false"
                    @mousemove="if(!isDown) return; $event.preventDefault(); const x = $event.pageX - startX; $refs.scrollContainer.scrollLeft = scrollLeft - x;">
                    <div class="px-5 py-3 border-b border-zinc-800 bg-zinc-900/40 flex items-center justify-between grab-scroll"
                        @mousedown="if($event.target.closest('button, input')) return; isDown = true; startX = $event.pageX; scrollLeft = $refs.scrollContainer.scrollLeft;">
                        <div class="flex items-center gap-4">
                            <div class="w-2 h-2 rounded-full bg-blue-500"></div>
                            <span class="text-[11px] font-bold uppercase tracking-widest text-zinc-400"
                                x-text="scriptName"></span>
                            <button @click="addNewEntry(groupFiles, scriptName)"
                                class="btn-action !py-1 !px-3 hover:text-blue-400"><i class="fa-solid fa-plus"></i>
                                Entry</button>
                            <button x-show="groupFiles[0].type !== 'tres'" @click="openAddPropModal(groupFiles)"
                                class="btn-action !py-1 !px-3 hover:text-green-400 border-green-900/20"><i
                                    class="fa-solid fa-table-columns"></i> Column</button>
                        </div>
                    </div>

                    <div class="overflow-x-auto custom-scrollbar grab-scroll" x-ref="scrollContainer"
                        @mousedown="if($event.target.closest('button, input, select')) return; isDown = true; startX = $event.pageX; scrollLeft = $refs.scrollContainer.scrollLeft;">
                        <table class="w-full text-left border-separate border-spacing-0">
                            <thead>
                                <tr class="bg-zinc-900/20">
                                    <th
                                        class="px-6 py-3 border-b border-zinc-800 text-[10px] font-bold text-zinc-500 uppercase col-id">
                                        Identifier</th>
                                    <template x-for="prop in getFieldsForGroup(scriptName, groupFiles)">
                                        <th
                                            class="px-4 py-3 border-b border-zinc-800 text-[10px] font-bold text-zinc-600 uppercase">
                                            <div class="flex items-center gap-2 group/h">
                                                <span x-text="prop" class="truncate max-w-[120px]"></span>
                                                <div
                                                    class="flex items-center opacity-0 group-hover/h:opacity-100 transition-all bg-zinc-900 rounded-md p-0.5 border border-zinc-800">
                                                    <button @click="openRenamePropModal(prop, groupFiles)"
                                                        class="w-7 h-7 flex items-center justify-center text-zinc-400 hover:text-white hover:bg-zinc-800 rounded transition-colors"
                                                        title="Rename Property"><i
                                                            class="fa-solid fa-pen-nib text-[12px]"></i></button>
                                                    <button @click="openChangeTypeModal(prop, groupFiles)"
                                                        class="w-7 h-7 flex items-center justify-center text-blue-500 hover:text-blue-300 hover:bg-zinc-800 rounded transition-colors"
                                                        title="Change Data Type"><i
                                                            class="fa-solid fa-gear text-[14px]"></i></button>
                                                </div>
                                            </div>
                                        </th>
                                    </template>

                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="file in groupFiles" :key="file.id">
                                    <tr class="g-table-row group transition-all" :class="file.dirty && 'dirty-row'">
                                        <td class="px-6 col-id">
                                            <div class="flex items-center justify-between group/id">
                                                <span
                                                    class="text-[13px] font-semibold text-zinc-300 group-hover:text-white truncate"
                                                    x-text="file.name"></span>
                                                <div class="opacity-0 group-hover/id:opacity-100 flex items-center gap-2 transition-all shrink-0 ml-2">
                                                    <button @click="renameEntry(file)"
                                                        class="p-1.5 text-zinc-600 hover:text-blue-400 transition-colors" title="Rename">
                                                        <i class="fa-solid fa-pen-to-square text-[11px]"></i>
                                                    </button>
                                                    <template x-if="file.type === 'tres'">
                                                        <button @click="duplicateEntry(file)"
                                                            class="p-1.5 text-zinc-600 hover:text-blue-400 transition-colors" title="Duplicate">
                                                            <i class="fa-solid fa-copy text-[11px]"></i>
                                                        </button>
                                                    </template>
                                                    <button @click="deleteEntry(file)"
                                                        class="p-1.5 text-zinc-600 hover:text-red-500 transition-colors" title="Delete">
                                                        <i class="fa-solid fa-trash-can text-[11px]"></i>
                                                    </button>
                                                </div>
                                            </div>
                                        </td>
                                        <template x-for="prop in getFieldsForGroup(scriptName, groupFiles)">
                                            <td class="px-2">
                                                <div class="min-w-[140px] flex items-center gap-1 group/field relative">
                                                    <template x-if="getFieldType(file, prop) === 'multiline'">
                                                        <div class="flex items-center gap-2 w-full">
                                                            <input type="text" :value="file.data[prop]" readonly
                                                                @click="openMultiline(file, prop)"
                                                                class="g-input !h-8 cursor-pointer overflow-hidden truncate italic text-zinc-500"
                                                                placeholder="Click to edit...">
                                                            <button @click="openMultiline(file, prop)"
                                                                class="text-blue-500 hover:text-blue-400"><i
                                                                    class="fa-solid fa-expand"></i></button>
                                                        </div>
                                                    </template>
                                                    <template x-if="getFieldType(file, prop) === 'bool'">
                                                        <button
                                                            @click="file.data[prop] = !file.data[prop]; markDirty(file)"
                                                            :class="file.data[prop] ? 'bg-blue-600' : 'bg-zinc-800'"
                                                            class="w-9 h-5 rounded-full px-0.5 flex items-center transition-all">
                                                            <div :class="file.data[prop] ? 'translate-x-4' : 'translate-x-0'"
                                                                class="w-4 h-4 bg-white rounded-full transition-all">
                                                            </div>
                                                        </button>
                                                    </template>
                                                    <template
                                                        x-if="getFieldType(file, prop) === 'enum' || getFieldType(file, prop) === 'export_enum'">
                                                        <select :value="file.data[prop]"
                                                            @change="updateValue(file, prop, $event.target.value)"
                                                            class="g-input !h-8 text-xs appearance-none cursor-pointer">
                                                            <template x-for="(val, idx) in getHint(file, prop).options">
                                                                <option
                                                                    :value="getFieldType(file, prop) === 'enum' ? idx : val"
                                                                    x-text="val"
                                                                    :selected="file.data[prop] == (getFieldType(file, prop) === 'enum' ? idx : val)">
                                                                </option>
                                                            </template>
                                                        </select>
                                                    </template>
                                                    <template
                                                        x-if="['bool', 'enum', 'export_enum', 'multiline'].indexOf(getFieldType(file, prop)) === -1">
                                                        <div class="relative w-full">
                                                            <template x-if="isRawGodotValue(file.data[prop])">
                                                                <button @click="openCollectionEditor(file, prop)"
                                                                    class="g-input !h-8 text-left flex items-center gap-2 cursor-pointer hover:border-blue-500/50 hover:bg-zinc-900 transition-all">
                                                                    <i class="fa-solid fa-layer-group text-[10px] text-blue-400 shrink-0"></i>
                                                                    <span class="text-[11px] text-zinc-400 font-mono truncate" x-text="getCollectionLabel(file.data[prop])"></span>
                                                                </button>
                                                            </template>
                                                            <template x-if="!isRawGodotValue(file.data[prop])">
                                                                <input type="text" :value="file.data[prop]"
                                                                    @input="updateValue(file, prop, $event.target.value)"
                                                                    :class="[hasIssue(file, prop) && 'input-error shake-error', !hasIssue(file, prop) && hasWarning(file, prop) && 'input-warning', typeof file.data[prop] === 'number' && 'type-number']"
                                                                    class="g-input !h-8 focus:bg-zinc-950"
                                                                    placeholder="...">
                                                            </template>
                                                            <div x-show="hasIssue(file, prop) || hasWarning(file, prop)"
                                                                class="absolute -right-1.5 -top-1.5 z-10">
                                                                <i class="fa-solid fa-circle-exclamation text-[10px] bg-zinc-950 rounded-full"
                                                                    :class="hasIssue(file, prop) ? 'text-red-500' : 'text-orange-400'"></i>
                                                            </div>
                                                        </div>
                                                    </template>
                                                </div>
                                            </td>
                                        </template>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
            </template>
        </main>
    </div>

    <!-- MODALS -->
    <!-- (Phần Modals giữ nguyên như cũ để đảm bảo tính năng) -->
    <div x-show="renamePropModal.open" x-cloak
        class="fixed inset-0 z-[260] flex items-center justify-center p-6 bg-black/80 backdrop-blur-md">
        <div class="bg-zinc-950 w-full max-w-md rounded-2xl border border-zinc-800 shadow-2xl overflow-hidden"
            @click.away="renamePropModal.open = false">
            <div
                class="px-6 py-4 border-b border-zinc-900 bg-zinc-900/30 text-[10px] font-bold uppercase text-orange-400">
                Rename Property</div>
            <div class="p-6 space-y-4">
                <div class="text-xs text-zinc-500">Old name: <span class="text-white font-mono"
                        x-text="renamePropModal.oldName"></span></div>
                <input type="text" x-model="renamePropModal.newName" class="g-input !h-12 border-orange-900/30"
                    placeholder="New Property Name">
            </div>
            <div class="px-6 py-4 border-t border-zinc-900 flex justify-end gap-3">
                <button @click="renamePropModal.open = false"
                    class="px-4 text-xs font-bold text-zinc-500">CANCEL</button>
                <button @click="confirmRenameProperty()"
                    class="btn-action !bg-orange-600 text-white border-none !px-6 uppercase">Rename All</button>
            </div>
        </div>
    </div>

    <div x-show="changeTypeModal.open" x-cloak
        class="fixed inset-0 z-[250] flex items-center justify-center p-6 bg-black/80 backdrop-blur-md">
        <div class="bg-zinc-950 w-full max-w-md rounded-2xl border border-zinc-800 shadow-2xl overflow-hidden"
            @click.away="changeTypeModal.open = false">
            <div
                class="px-6 py-4 border-b border-zinc-900 bg-zinc-900/30 text-[10px] font-bold uppercase text-blue-500">
                Change Column Type</div>
            <div class="p-6 space-y-4">
                <div class="text-xs text-zinc-500">Column: <span class="text-white font-mono"
                        x-text="changeTypeModal.prop"></span></div>
                <select x-model="changeTypeModal.newType" class="g-input !h-12">
                    <option value="string">String</option>
                    <option value="number">Number</option>
                    <option value="boolean">Boolean</option>
                </select>
                <div class="bg-blue-500/10 border border-blue-500/20 p-3 rounded-lg text-[11px] text-blue-400 italic">
                    Values will be converted automatically.</div>
            </div>
            <div class="px-6 py-4 border-t border-zinc-900 flex justify-end gap-3">
                <button @click="changeTypeModal.open = false"
                    class="px-4 text-xs font-bold text-zinc-500">CANCEL</button>
                <button @click="confirmChangeType()" class="btn-action btn-primary !px-6 uppercase">Convert All</button>
            </div>
        </div>
    </div>

    <div x-show="multilineModal.open" x-cloak
        class="fixed inset-0 z-[300] flex items-center justify-center p-6 bg-black/90 backdrop-blur-md">
        <div
            class="bg-zinc-950 w-full max-w-3xl rounded-2xl border border-zinc-800 shadow-2xl flex flex-col overflow-hidden h-[80vh]">
            <div class="px-6 py-4 border-b border-zinc-900 bg-zinc-900/30 flex justify-between items-center">
                <span class="text-[10px] font-bold uppercase tracking-widest text-blue-500">Edit Long Text
                    Content</span>
                <span class="text-[10px] text-zinc-500 font-mono" x-text="multilineModal.prop"></span>
            </div>
            <textarea x-model="multilineModal.text"
                class="flex-1 bg-zinc-950 p-6 text-[13px] text-zinc-300 outline-none resize-none font-mono leading-relaxed"
                placeholder="Write content here..."></textarea>
            <div class="px-6 py-4 border-t border-zinc-900 bg-zinc-900/10 flex justify-end gap-3">
                <button @click="multilineModal.open = false"
                    class="text-xs font-bold text-zinc-500 uppercase px-4">Close</button>
                <button @click="saveMultiline()" class="btn-action btn-primary !px-8">Update Content</button>
            </div>
        </div>
    </div>

    <div x-show="createModal.open" x-cloak
        class="fixed inset-0 z-[110] flex items-center justify-center p-6 bg-black/80 backdrop-blur-md">
        <div class="bg-zinc-950 w-full max-w-lg rounded-2xl border border-zinc-800 p-6 space-y-4 shadow-2xl"
            @click.away="createModal.open = false">
            <h3 class="text-blue-500 font-bold uppercase text-[10px] tracking-widest">Create New Resource</h3>
            <input type="text" x-model="createModal.name" class="g-input !h-12 border-zinc-700"
                placeholder="Resource Filename">
            <div class="grid grid-cols-2 gap-4">
                <button @click="createModal.ext = '.tres'"
                    :class="createModal.ext === '.tres' ? 'border-blue-500 bg-blue-500/10 text-blue-400' : 'border-zinc-800'"
                    class="border p-4 rounded-xl transition-all font-bold">.tres</button>
                <button @click="createModal.ext = '.json'"
                    :class="createModal.ext === '.json' ? 'border-blue-500 bg-blue-500/10 text-blue-400' : 'border-zinc-800'"
                    class="border p-4 rounded-xl transition-all font-bold">.json</button>
            </div>
            <div x-show="createModal.ext === '.json'" class="space-y-3 pt-2 border-t border-zinc-900">
                <label class="text-[10px] font-bold text-zinc-600 uppercase italic">Define Initial Object
                    Schema:</label>
                <div class="flex gap-2">
                    <input type="text" x-model="createModal.jsonNewPropName" class="g-input flex-1"
                        placeholder="Prop Name">
                    <select x-model="createModal.jsonNewPropType" class="g-input !w-24">
                        <option value="string">String</option>
                        <option value="number">Number</option>
                        <option value="boolean">Bool</option>
                    </select>
                    <button @click="addJsonPropToSchema()" class="btn-action !bg-blue-600 text-white border-none"><i
                            class="fa-solid fa-plus"></i></button>
                </div>
                <div
                    class="space-y-1 max-h-32 overflow-y-auto custom-scrollbar bg-black/20 rounded-lg p-2 border border-zinc-900">
                    <template x-for="(p, index) in createModal.jsonSchema" :key="index">
                        <div

    <script>
        function editor() {
            return {
                allFiles: [], folders: [], scripts: {}, classMap: {}, activeFolder: '', searchQuery: '',
                rootHandle: null, dirtyCount: 0, isSaving: false,
                sidebarOpen: true,
                blacklist: ['script', 'uid', 'format', 'load_steps', 'atlas', 'texture', 'sprite_frames', 'icon', 'metadata/_custom_type_script'],
                godotTypes: ['ExtResource', 'SubResource', 'Rect2', 'Rect2i', 'Vector2', 'Vector2i', 'Vector3', 'Vector3i', 'Vector4', 'Vector4i', 'Color', 'Transform2D', 'Transform3D', 'Basis', 'Quaternion', 'Plane', 'AABB', 'NodePath', 'PackedByteArray', 'PackedInt32Array', 'PackedInt64Array', 'PackedFloat32Array', 'PackedFloat64Array', 'PackedStringArray', 'PackedVector2Array', 'PackedVector3Array', 'PackedColorArray'],
                originalTypes: new Map(),
                ignoredFolders: [], // Lưu danh sách folder từ file text
                errorSummary: { open: false },
                createModal: { open: false, name: '', ext: '.tres', targetClone: '', cloneSearch: '', jsonSchema: [], jsonNewPropName: '', jsonNewPropType: 'string' },
                addPropModal: { open: false, group: null, name: '', type: 'string', defaultValue: '' },
                changeTypeModal: { open: false, prop: '', group: null, newType: 'string' },
                renamePropModal: { open: false, oldName: '', group: null, newName: '' },
                importModal: { open: false, text: '' },
                multilineModal: { open: false, file: null, prop: '', text: '' },
                collectionModal: { open: false, file: null, prop: '', kind: '', godotType: '', items: [], pairs: [], arrayDicts: [] },
                canRestore: false, savedName: '', savedHandle: null,

                async init() {
                    const saved = await this.getStoredHandle();
                    if (saved) { this.savedHandle = saved; this.savedName = saved.name; this.canRestore = true; }
                },
                async openDB() {
                    return new Promise((resolve) => {
                        const request = indexedDB.open("DatabaseMakerDB", 1);
                        request.onupgradeneeded = (e) => { e.target.result.createObjectStore("handles"); };
                        request.onsuccess = (e) => resolve(e.target.result);
                    });
                },
                async storeHandle(handle) {
                    const db = await this.openDB();
                    const tx = db.transaction("handles", "readwrite");
                    tx.objectStore("handles").put(handle, "lastRoot");
                },
                async getStoredHandle() {
                    try {
                        const db = await this.openDB();
                        return new Promise((resolve) => {
                            const request = db.transaction("handles").objectStore("handles").get("lastRoot");
                            request.onsuccess = () => resolve(request.result);
                            request.onerror = () => resolve(null);
                        });
                    } catch (e) { return null; }
                },
                get errorList() {
                    const list = [];
                    this.allFiles.forEach(f => {
                        Object.keys(f.data).forEach(prop => {
                            if (this.hasIssue(f, prop)) list.push({ id: f.id, fileName: f.name, prop, value: f.data[prop], folder: f.folder, issueType: "Error" });
                        });
                    });
                    return list;
                },
                get errorCount() { return this.errorList.length; },
                get filteredTemplates() {
                    const q = this.createModal.cloneSearch.toLowerCase();
                    return this.allFiles.filter(f => f.type === 'tres' && (f.name.toLowerCase().includes(q) || f.scriptName.toLowerCase().includes(q))).slice(0, 8);
                },
                addJsonPropToSchema() {
                    if (!this.createModal.jsonNewPropName.trim()) return;
                    this.createModal.jsonSchema.push({ name: this.createModal.jsonNewPropName.trim(), type: this.createModal.jsonNewPropType });
                    this.createModal.jsonNewPropName = '';
                },
                async openProject() {
                    try {
                        this.rootHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
                        await this.storeHandle(this.rootHandle);
                        this.canRestore = false;
                        await this.loadProjectData();
                    } catch (e) { }
                },
                async restoreLastProject() {
                    try {
                        if (await this.savedHandle.requestPermission({ mode: 'readwrite' }) === 'granted') {
                            this.rootHandle = this.savedHandle;
                            this.canRestore = false;
                            await this.loadProjectData();
                        }
                    } catch (e) { alert("Restore failed: " + e.message); this.canRestore = false; }
                },
                async reloadProject() {
                    if (this.dirtyCount > 0 && !confirm("Discard changes?")) return;
                    await this.loadProjectData();
                },
                async loadProjectData() {
                    this.isSaving = true; this.allFiles = []; this.scripts = {}; this.classMap = {}; this.originalTypes.clear(); this.dirtyCount = 0;
                    this.ignoredFolders = [];
                    try {
                        // BƯỚC 1: Đọc file cấu hình loại trừ
                        try {
                            const ignoreHandle = await this.rootHandle.getFileHandle('.dbmakerignore');
                            const ignoreFile = await ignoreHandle.getFile();
                            const ignoreContent = await ignoreFile.text();
                            this.ignoredFolders = ignoreContent.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 0);
                        } catch (e) { this.ignoredFolders = []; }

                        // BƯỚC 2: Quét thư mục
                        await this.scanDir(this.rootHandle, ""); 
                        this.buildTree(); 
                    } finally { this.isSaving = false; }
                },
                async scanDir(handle, path) {
                    for await (const entry of handle.values()) {
                        const curPath = path + entry.name;
                        if (entry.kind === 'directory') {
                            // LOẠI TRỪ: Bắt đầu bằng "." hoặc nằm trong list ignore
                            if (entry.name.startsWith('.')) continue;
                            if (this.ignoredFolders.includes(entry.name)) continue;
                            
                            await this.scanDir(entry, curPath + "/");
                        }
                        else {
                            if (entry.name === '.dbmakerignore') continue; // Không đọc file cấu hình

                            const file = await entry.getFile(); const content = await file.text();
                            if (entry.name.endsWith('.gd')) this.parseGDScript(content, entry.name);
                            else if (entry.name.endsWith('.tres')) {
                                const { header, body } = this.splitTres(content);
                                const parsed = this.parseTresBody(body);
                                this.allFiles.push({ id: curPath, name: entry.name, path: curPath, folder: path.replace(/\/$/, "") || "root", handle: entry, data: parsed, type: 'tres', scriptName: this.getScriptNameFromTres(content), dirty: false, rawHeader: header, rawBody: body });
                                this.recordTypes(curPath, parsed);
                            } else if (entry.name.endsWith('.json')) {
                                try {
                                    const json = JSON.parse(content);
                                    for (let [id, val] of Object.entries(json)) {
                                        const eid = curPath + ":" + id;
                                        this.allFiles.push({ id: eid, name: id, path: curPath, folder: path.replace(/\/$/, "") || "root", handle: entry, data: val, type: 'json', scriptName: entry.name, dirty: false });
                                        this.recordTypes(eid, val);
                                    }
                                } catch (e) { }
                            }
                        }
                    }
                },
                recordTypes(id, data) {
                    const t = {}; Object.entries(data).forEach(([k, v]) => t[k] = typeof v);
                    this.originalTypes.set(id, t);
                },
                updateValue(file, prop, newValue) {
                    const t = this.originalTypes.get(file.id);
                    const target = t ? t[prop] : 'string';
                    if (target === 'number') file.data[prop] = newValue === "" ? 0 : (isNaN(newValue) ? newValue : Number(newValue));
                    else if (target === 'boolean') file.data[prop] = (newValue === 'true' || newValue === true);
                    else file.data[prop] = newValue;
                    this.markDirty(file);
                },
                async internalCreate(name, ext, templateId = null, initialData = null) {
                    const fullName = name.endsWith(ext) ? name : name + ext;
                    let dir = this.rootHandle;

                    if (this.activeFolder && this.activeFolder !== "root") {
                        const parts = this.activeFolder.split('/').filter(p => p.length > 0);
                        for (let p of parts) { dir = await dir.getDirectoryHandle(p); }
                    }

                    const handle = await dir.getFileHandle(fullName, { create: true });
                    const path = (this.activeFolder === "root" || !this.activeFolder ? "" : this.activeFolder + "/") + fullName;
                    const folderPath = this.activeFolder || "root";

                    let data = {}, header = `[gd_resource type="Resource" format=3]\n\n[resource]`, body = "", sName = ext === '.tres' ? "Godot Resource" : fullName;

                    if (ext === '.tres' && templateId) {
                        const src = this.allFiles.find(f => f.id === templateId);
                        if (src) {
                            data = JSON.parse(JSON.stringify(src.data));
                            // Strip uid khỏi header — Godot sẽ tự sinh uid mới khi import
                            // Nếu giữ nguyên uid, Godot 4 nhận 2 file là cùng 1 resource → edit chéo nhau
                            header = src.rawHeader.replace(/\s+uid="uid:\/\/[^"]*"/, '');
                            sName = src.scriptName;
                            body = src.rawBody;
                        }
                    } else if (ext === '.json' && initialData) {
                        data = initialData; const defaultEntryName = "new_entry_1"; const jsonPayload = {}; jsonPayload[defaultEntryName] = data;
                        const w = await handle.createWritable(); await w.write(JSON.stringify(jsonPayload, null, "\t")); await w.close();
                        const eid = path + ":" + defaultEntryName;
                        const newFile = { id: eid, name: defaultEntryName, path, folder: folderPath, handle, data: JSON.parse(JSON.stringify(data)), type: 'json', scriptName: fullName, dirty: false };
                        this.allFiles.push(newFile); this.recordTypes(eid, data); this.buildTree(); return;
                    }
                    const newFile = { id: path, name: fullName, path, folder: folderPath, handle, data, type: ext.replace('.', ''), scriptName: sName, dirty: true, rawHeader: header, rawBody: body };
                    this.allFiles.push(newFile); this.recordTypes(path, data); this.dirtyCount++; this.buildTree();
                },
                buildTree() {
                    let ps = [...new Set(this.allFiles.map(x => x.folder))];
                    if (ps.length === 0) ps = ["root"];
                    this.folders = ps.sort().map(p => ({ name: p === "root" ? 'Resources' : p.split('/').pop(), fullPath: p, level: p === "root" ? 0 : p.split('/').filter(x => x).length }));
                    if (!this.activeFolder && this.folders.length > 0) this.activeFolder = this.folders[0].fullPath;
                },
                parseGDScript(c, f) {
                    const hints = {}, enums = {}, classNameMatch = c.match(/class_name\s+(\w+)/);
                    if (classNameMatch) this.classMap[classNameMatch[1]] = f;
                    const exMatch = c.match(/extends\s+(?:"res:\/\/([^"]+)"|(\w+))/);
                    let parent = exMatch ? (exMatch[1] ? exMatch[1].split('/').pop() : exMatch[2]) : null;
                    const enMatches = c.matchAll(/enum\s+(\w+)\s*\{([\s\S]+?)\}/g);
                    for (const m of enMatches) enums[m[1]] = m[2].split(',').map(v => v.trim().split('=')[0].trim()).filter(x => x);
                    c.split('\n').forEach(line => {
                        const l = line.trim(), varMatch = l.match(/var\s+(\w+)/); if (!varMatch) return; const varName = varMatch[1];
                        if (l.includes('@export_multiline')) hints[varName] = { type: 'multiline' };
                        else if (l.includes('@export_enum')) hints[varName] = { type: 'export_enum', options: l.match(/\(([\s\S]+?)\)/)[1].split(',').map(s => s.replace(/["']/g, "").trim()) };
                        else if (l.includes(': bool') || l.includes('= true') || l.includes('= false')) hints[varName] = { type: 'bool' };
                        else if (l.includes(': int') || l.includes(': float')) hints[varName] = { type: 'number' };
                        else { for (let e in enums) { if (l.includes(`: ${e}`)) hints[varName] = { type: 'enum', options: enums[e] }; } }
                    });
                    this.scripts[f] = { hints, parent };
                },
                getScriptNameFromTres(c) {
                    const sr = c.match(/script\s*=\s*ExtResource\("([^"]+)"\)/); if (!sr) return "StaticResource";
                    return c.split('\n').find(l => l.includes(`id="${sr[1]}"`) && l.includes('.gd'))?.match(/path="res:\/\/([^"]+)"/)?.[1].split('/').pop() || "StaticResource";
                },
                splitTres(c) { const m = "[resource]", i = c.indexOf(m); return i === -1 ? { header: c, body: "" } : { header: c.substring(0, i + m.length), body: c.substring(i + m.length) }; },
                parseTresBody(b) {
                    // Join multiline values: a new key always starts at col 0 with "key ="
                    // Lines that don't match that pattern are continuations of the previous value
                    const lines = b.split(/\r?\n/);
                    const joined = [];
                    for (const l of lines) {
                        const t = l.trim();
                        if (!t || t.startsWith('[')) { joined.push(l); continue; }
                        // A new key line: non-indented, contains '=' and doesn't start with quote/bracket
                        const isNewKey = /^[a-zA-Z_][a-zA-Z0-9_\/]*\s*=/.test(t);
                        if (isNewKey) { joined.push(t); }
                        else if (joined.length > 0) { joined[joined.length - 1] += ' ' + t; }
                    }
                    const data = {};
                    joined.forEach(l => {
                        const t = l.trim(); if (!t || !t.includes('=') || t.startsWith('[')) return;
                        const eqIdx = t.indexOf('='); const key = t.substring(0, eqIdx).trim(); let val = t.substring(eqIdx + 1).trim();
                        if (this.blacklist.includes(key.toLowerCase()) || key.startsWith('metadata/')) return;
                        // Keep raw Godot syntax (typed arrays, built-in types, array-of-dicts)
                        if (this.godotTypes.some(gt => val.startsWith(gt + "("))) return;
                        if (/^Array\[.+\]\(/.test(val) || /^Dictionary\[.+\]\(/.test(val) || val.startsWith('[{') || val.startsWith('{')) { data[key] = val; return; }
                        if (val.startsWith('"') && val.endsWith('"')) val = val.substring(1, val.length - 1);
                        else if (val === "true") val = true;
                        else if (val === "false") val = false;
                        else if (!isNaN(val) && val !== "") val = Number(val);
                        data[key] = val;
                    }); return data;
                },
                getHint(f, p) {
                    let h = {}, cur = f.scriptName, s = 0;
                    while (cur && s < 10) { let si = this.scripts[cur] || this.scripts[this.classMap[cur]]; if (!si) break; h = { ...si.hints, ...h }; cur = si.parent; s++; }
                    return h[p] || { type: 'default' };
                },
                getFieldType(f, p) {
                    const h = this.getHint(f, p); if (h.type !== 'default') return h.type;
                    const typeInMeta = this.originalTypes.get(f.id)?.[p];
                    if (typeInMeta === 'number') return 'number';
                    if (typeInMeta === 'boolean') return 'bool';
                    return (typeof f.data[p] === 'boolean' ? 'bool' : 'default');
                },
                getFieldsForGroup(s, f) { let k = new Set(); f.forEach(x => Object.keys(x.data).forEach(y => k.add(y))); return Array.from(k); },
                get groupedFiles() {
                    let f = this.searchQuery ? this.allFiles.filter(x => x.name.toLowerCase().includes(this.searchQuery.toLowerCase())) : this.allFiles.filter(x => x.folder === this.activeFolder);
                    const groups = {}; f.forEach(x => { if (!groups[x.scriptName]) groups[x.scriptName] = []; groups[x.scriptName].push(x); }); return groups;
                },
                markDirty(f) { if (!f.dirty) { f.dirty = true; this.dirtyCount++; } },
                addNewEntry(g, s) {
                    const f = g[0], id = prompt("Identifier:"); if (!id) return;
                    if (f.type === 'json') {
                        const ed = {}; Object.keys(f.data).forEach(k => { const v = f.data[k]; ed[k] = (typeof v === 'boolean' ? false : (typeof v === 'number' ? 0 : "")); });
                        const n = { ...f, id: f.path + ":" + id, name: id, data: ed, dirty: true }; this.allFiles.push(n); this.recordTypes(n.id, n.data); this.dirtyCount++;
                    } else this.internalCreate(id, '.tres', f.id);
                },
                isRawGodotValue(v) {
                    if (typeof v !== 'string') return false;
                    return this.godotTypes.some(gt => v.startsWith(gt + "("))
                        || /^Array\[.+\]\(/.test(v)
                        || /^Dictionary\[.+\]\(/.test(v)
                        || v.trimStart().startsWith('[{')
                        || v.trimStart().startsWith('{');
                },
                serializeTresValue(v) {
                    if (typeof v !== 'string') return String(v);
                    if (this.isRawGodotValue(v)) return v;
                    return `"${v}"`;
                },
                countDepth(s) {
                    let d = 0;
                    for (const c of s) { if ('([{'.includes(c)) d++; else if (')]}'.includes(c)) d--; }
                    return d;
                },
                async saveDirtyFiles() {
                    if (this.dirtyCount === 0 || this.errorCount > 0) return; this.isSaving = true;
                    try {
                        const paths = [...new Set(this.allFiles.filter(f => f.dirty).map(f => f.path))];
                        for (let p of paths) {
                            const entries = this.allFiles.filter(f => f.dirty && f.path === p);
                            const first = entries[0]; const w = await first.handle.createWritable();
                            if (first.type === 'tres') {
                                const lines = first.rawBody.split(/\r?\n/);
                                const up = new Set();
                                const nl = [];
                                let depth = 0; // bracket depth — when > 0 we're inside a multiline value
                                for (const line of lines) {
                                    const tr = line.trim();
                                    if (depth > 0) {
                                        // Inside a multiline value — count brackets to find end, then skip
                                        depth += this.countDepth(tr);
                                        continue;
                                    }
                                    const isKeyLine = tr && !tr.startsWith('[') && /^[a-zA-Z_][a-zA-Z0-9_\/]*\s*=/.test(tr);
                                    if (isKeyLine) {
                                        const k = tr.substring(0, tr.indexOf('=')).trim();
                                        if (first.data.hasOwnProperty(k)) {
                                            const v = first.data[k];
                                            const vStr = this.serializeTresValue(v);
                                            nl.push(`${k} = ${vStr}`);
                                            up.add(k);
                                            // Check if original line opens a multiline block
                                            const origVal = tr.substring(tr.indexOf('=') + 1).trim();
                                            const d = this.countDepth(origVal);
                                            if (d > 0) depth = d; // original was multiline — skip continuation
                                        } else {
                                            nl.push(line);
                                            const origVal = tr.substring(tr.indexOf('=') + 1).trim();
                                            const d = this.countDepth(origVal);
                                            if (d > 0) depth = d;
                                        }
                                    } else {
                                        nl.push(line);
                                    }
                                }
                                Object.keys(first.data).forEach(k => { if (!up.has(k)) { const v = first.data[k]; let vStr = this.serializeTresValue(v); nl.push(`${k} = ${vStr}`); } });
                                const cleanBody = nl.join('\n').replace(/^\n+/, '').replace(/\n{3,}/g, '\n\n').trimEnd();
                                const output = first.rawHeader.trimEnd() + "\n" + cleanBody + "\n";
                                await w.write(output); first.rawBody = cleanBody;
                            } else {
                                const allInPath = this.allFiles.filter(f => f.path === p);
                                const json = {}; allInPath.forEach(e => json[e.name] = e.data);
                                await w.write(JSON.stringify(json, null, "\t"));
                            }
                            await w.close(); entries.forEach(e => e.dirty = false);
                        }
                        this.dirtyCount = 0;
                    } catch (e) { alert("Save failed!"); } finally { this.isSaving = false; }
                },
                async confirmCreateFile() {
                    if (!this.createModal.name) return;
                    let initialData = {};
                    if (this.createModal.ext === '.json') {
                        this.createModal.jsonSchema.forEach(p => { initialData[p.name] = (p.type === 'number' ? 0 : (p.type === 'boolean' ? false : "")); });
                        await this.internalCreate(this.createModal.name, this.createModal.ext, null, initialData);
                    } else { await this.internalCreate(this.createModal.name, this.createModal.ext, this.createModal.targetClone); }
                    this.createModal.open = false;
                },
                openCreateModal() { this.createModal = { open: true, name: '', ext: '.tres', targetClone: '', cloneSearch: '', jsonSchema: [], jsonNewPropName: '', jsonNewPropType: 'string' }; },
                hasIssue(file, prop) {
                    const v = file.data[prop], t = this.originalTypes.get(file.id), hint = this.getHint(file, prop);
                    if (t && t[prop] === 'number' && isNaN(v) && v !== "") return true;
                    if (hint && hint.type === 'enum' && v === null) return true;
                    return false;
                },
                hasWarning(file, prop) { return file.type === 'tres' && (file.data[prop] === "" || file.data[prop] === null); },
                exportAllData() {
                    const b = {}; this.allFiles.forEach(f => b[f.id] = f.data);
                    const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(b, null, 2)], { type: 'application/json' }));
                    a.download = `database_export.json`; a.click();
                },
                processImport(jsonStr) {
                    try {
                        const imported = JSON.parse(jsonStr); let count = 0;
                        this.allFiles.forEach(f => { if (imported[f.id]) { f.data = imported[f.id]; this.markDirty(f); count++; } });
                        alert(`Synced ${count} items.`);
                    } catch (e) { alert("Invalid JSON"); }
                },
                getFolderErrorCount(path) { return this.allFiles.filter(f => f.folder === path && Object.keys(f.data).some(p => this.hasIssue(f, p))).length; },
                goToError(err) { this.activeFolder = err.folder; this.searchQuery = err.fileName; this.errorSummary.open = false; },
                openAddPropModal(groupFiles) { this.addPropModal = { open: true, group: groupFiles, name: '', type: 'string', defaultValue: '' }; },
                confirmAddProperty() {
                    const { name, type, defaultValue, group } = this.addPropModal; if (!name) return;
                    let val = type === 'number' ? Number(defaultValue) || 0 : (type === 'boolean' ? (defaultValue === 'true') : String(defaultValue));
                    group.forEach(f => { if (!(name in f.data)) { f.data[name] = val; this.markDirty(f); this.recordTypes(f.id, f.data); } });
                    this.addPropModal.open = false;
                },
                openRenamePropModal(prop, groupFiles) { this.renamePropModal = { open: true, oldName: prop, group: groupFiles, newName: prop }; },
                confirmRenameProperty() {
                    const { oldName, newName, group } = this.renamePropModal; if (!newName || oldName === newName) return;
                    group.forEach(f => { if (f.data.hasOwnProperty(oldName)) { f.data[newName] = f.data[oldName]; delete f.data[oldName]; const t = this.originalTypes.get(f.id); if (t && t[oldName]) { t[newName] = t[oldName]; delete t[oldName]; } this.markDirty(f); } });
                    this.renamePropModal.open = false;
                },
                openChangeTypeModal(prop, groupFiles) { const currentType = this.originalTypes.get(groupFiles[0].id)?.[prop] || 'string'; this.changeTypeModal = { open: true, prop, group: groupFiles, newType: currentType }; },
                confirmChangeType() {
                    const { prop, group, newType } = this.changeTypeModal;
                    group.forEach(f => {
                        let val = f.data[prop];
                        if (newType === 'number') val = (val === true) ? 1 : (val === false ? 0 : (Number(val) || 0));
                        else if (newType === 'boolean') val = !!val;
                        else val = String(val);
                        f.data[prop] = val; const t = this.originalTypes.get(f.id); if (t) t[prop] = newType; this.markDirty(f);
                    });
                    this.changeTypeModal.open = false;
                },
                openMultiline(file, prop) { this.multilineModal = { open: true, file, prop, text: file.data[prop] }; },
                saveMultiline() { this.multilineModal.file.data[this.multilineModal.prop] = this.multilineModal.text; this.markDirty(this.multilineModal.file); this.multilineModal.open = false; },

                // ===== COLLECTION EDITOR =====
                getCollectionLabel(v) {
                    if (typeof v !== 'string') return String(v);
                    const kind = this._detectKind(v);
                    if (kind === 'array_string' || kind === 'array_number') {
                        const items = this._extractArrayItems(v);
                        if (items.length === 0) return '[ empty ]';
                        const preview = items.slice(0, 3).join(', ');
                        return items.length > 3 ? `[ ${preview}, +${items.length - 3} ]` : `[ ${preview} ]`;
                    }
                    if (kind === 'dict') {
                        const pairs = this._parseDictPairs(this._extractDictInner(v));
                        if (pairs.length === 0) return '{ empty }';
                        const preview = pairs.slice(0, 2).map(p => `${p.k}: ${p.v}`).join(', ');
                        return pairs.length > 2 ? `{ ${preview}, +${pairs.length - 2} }` : `{ ${preview} }`;
                    }
                    if (kind === 'array_dict') {
                        const items = this._parseArrayDicts(v);
                        if (items.length === 0) return '[{ empty }]';
                        const first = items[0].slice(0, 2).map(p => `${p.k}: ${p.v}`).join(', ');
                        return items.length > 1 ? `[{ ${first} }, +${items.length - 1} ]` : `[{ ${first} }]`;
                    }
                    return v.length > 30 ? v.substring(0, 28) + '…' : v;
                },
                _detectKind(v) {
                    if (!v || typeof v !== 'string') return 'raw';
                    const t = v.trimStart();
                    if (/^Array\[String\]/i.test(t) || /^Array\[NodePath\]/i.test(t)) return 'array_string';
                    if (/^Array\[(int|float|double)\]/i.test(t)) return 'array_number';
                    if (/^Dictionary\[/i.test(t) || (t.startsWith('{') && !t.startsWith('[{'))) return 'dict';
                    if (t.startsWith('[{')) return 'array_dict';
                    return 'raw';
                },
                _extractGodotTypeLabel(v) {
                    const m = v.match(/^([A-Za-z]+\[[^\]]+\])/); return m ? m[1] : (v.startsWith('{') ? 'Dictionary' : v.startsWith('[{') ? 'Array[Dictionary]' : '');
                },
                _extractArrayItems(v) {
                    // Array[String](["a","b"]) or Array[int]([1,2])
                    const m = v.match(/\(\[([\s\S]*)\]\)\s*$/);
                    if (!m || !m[1].trim()) return [];
                    return m[1].split(',').map(s => s.trim().replace(/^"(.*)"$/, '$1')).filter(s => s !== '');
                },
                _extractDictInner(v) {
                    // Dictionary[...]({ ... }) or { ... }
                    const dm = v.match(/\(\{([\s\S]*)\}\)\s*$/);
                    if (dm) return dm[1];
                    const sm = v.match(/^\{([\s\S]*)\}\s*$/);
                    if (sm) return sm[1];
                    return '';
                },
                _parseDictPairs(inner) {
                    if (!inner.trim()) return [];
                    const pairs = []; const re = /"([^"]+)"\s*:\s*([^,}]+)/g; let m;
                    while ((m = re.exec(inner)) !== null) pairs.push({ k: m[1], v: m[2].trim() });
                    return pairs;
                },
                _parseArrayDicts(v) {
                    // [{ "k": v, ... }, { ... }]
                    const inner = v.replace(/^\[/, '').replace(/\]\s*$/, '').trim();
                    if (!inner) return [];
                    // Split on }, { boundary
                    const objStrs = []; let depth = 0, start = 0;
                    for (let i = 0; i < inner.length; i++) {
                        if (inner[i] === '{') { if (depth === 0) start = i; depth++; }
                        else if (inner[i] === '}') { depth--; if (depth === 0) objStrs.push(inner.slice(start, i+1)); }
                    }
                    return objStrs.map(s => this._parseDictPairs(s.replace(/^\{/, '').replace(/\}$/, '')));
                },
                openCollectionEditor(file, prop) {
                    const v = file.data[prop]; const kind = this._detectKind(v);
                    this.collectionModal = {
                        open: true, file, prop, kind,
                        godotType: this._extractGodotTypeLabel(v),
                        items: (kind === 'array_string' || kind === 'array_number') ? this._extractArrayItems(v) : [],
                        pairs: kind === 'dict' ? this._parseDictPairs(this._extractDictInner(v)) : [],
                        arrayDicts: kind === 'array_dict' ? this._parseArrayDicts(v) : [],
                    };
                },
                getCollectionPreview() {
                    const m = this.collectionModal; if (!m.open) return '';
                    try {
                        if (m.kind === 'array_string' || m.kind === 'array_number') return `${m.items.length} item(s)`;
                        if (m.kind === 'dict') return `${m.pairs.filter(p=>p.k).length} key(s)`;
                        if (m.kind === 'array_dict') return `${m.arrayDicts.length} object(s)`;
                    } catch(e) {}
                    return '';
                },
                _serializeCollection() {
                    const m = this.collectionModal;
                    const gt = m.godotType;
                    if (m.kind === 'array_string' || m.kind === 'array_number') {
                        const items = m.items.filter(s => s !== '');
                        const isNum = m.kind === 'array_number';
                        const inner = items.map(s => isNum ? s : `"${s}"`).join(', ');
                        return `${gt}([${inner}])`;
                    }
                    if (m.kind === 'dict') {
                        const pairs = m.pairs.filter(p => p.k !== '');
                        // Detect value type: if original was Dictionary[String, int] keep int, float for Dictionary[String, float]
                        const isFloat = gt.includes('float') || gt.includes('double');
                        const inner = pairs.map(p => `"${p.k}": ${isFloat ? (parseFloat(p.v)||0).toFixed(1) : (parseInt(p.v)||0)}`).join(', ');
                        if (gt.startsWith('Dictionary')) return `${gt}({ ${inner} })`;
                        return `{ ${inner} }`;
                    }
                    if (m.kind === 'array_dict') {
                        const objStrs = m.arrayDicts.map(pairs => {
                            const inner = pairs.filter(p=>p.k).map(p => {
                                const num = Number(p.v); const isNum = p.v.trim() !== '' && !isNaN(num);
                                return `"${p.k}": ${isNum ? p.v : `"${p.v}"`}`;
                            }).join(', ');
                            return `{ ${inner} }`;
                        });
                        return `[${objStrs.join(', ')}]`;
                    }
                    return m.file.data[m.prop];
                },
                saveCollectionEdit() {
                    const raw = this._serializeCollection();
                    this.collectionModal.file.data[this.collectionModal.prop] = raw;
                    this.markDirty(this.collectionModal.file);
                    this.collectionModal.open = false;
                },
                async renameEntry(file) {
                    const newName = prompt("New Identifier Name:", file.name); if (!newName || newName === file.name) return;
                    if (file.type === 'tres') {
                        try {
                            const newFileName = newName.endsWith('.tres') ? newName : newName + '.tres';
                            const oldPath = file.path; const newPath = (file.folder === 'root' ? "" : file.folder + "/") + newFileName;
                            if (this.allFiles.find(f => f.path === newPath)) { alert("File already exists!"); return; }
                            this.isSaving = true; let dir = this.rootHandle; if (file.folder !== "root") for (let p of file.folder.split('/')) dir = await dir.getDirectoryHandle(p);
                            const newHandle = await dir.getFileHandle(newFileName, { create: true });
                            const w = await newHandle.createWritable(); await w.write(file.rawHeader + "\n" + file.rawBody); await w.close();
                            await dir.removeEntry(file.name); file.handle = newHandle;
                            const oldId = file.id; file.name = newFileName; file.path = newPath; file.id = newPath;
                            const types = this.originalTypes.get(oldId); this.originalTypes.delete(oldId); this.originalTypes.set(file.id, types);
                            this.buildTree();
                        } catch (e) { alert("Rename failed: " + e.message); } finally { this.isSaving = false; }
                    } else {
                        const pathEntries = this.allFiles.filter(f => f.path === file.path);
                        if (pathEntries.find(f => f.name === newName)) { alert("Identifier already exists!"); return; }
                        const oldId = file.id; file.name = newName; file.id = file.path + ":" + newName;
                        const types = this.originalTypes.get(oldId); this.originalTypes.delete(oldId); this.originalTypes.set(file.id, types);
                        this.markDirty(file);
                    }
                },
                async deleteEntry(f) {
                    if (!confirm("Delete?")) return;
                    if (f.type === 'tres') { await f.handle.remove(); this.allFiles = this.allFiles.filter(x => x.id !== f.id); }
                    else { const p = f.path; this.allFiles = this.allFiles.filter(x => x.id !== f.id); this.allFiles.filter(x => x.path === p).forEach(x => this.markDirty(x)); }
                    this.buildTree();
                },
                async duplicateEntry(f) {
                    // Lấy tên gợi ý: bỏ .tres rồi thêm _copy
                    const baseName = f.name.replace(/\.tres$/, '');
                    const suggested = baseName + '_copy';
                    const newName = prompt("Tên file mới:", suggested);
                    if (!newName) return;
                    await this.internalCreate(newName, '.tres', f.id);
                }
            }
        }
    </script>
