<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Database Game Maker v2.7 - Fixed & Clean</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg-main: #09090b; --bg-side: #09090b; --bg-panel: #121217; --bg-input: #000000; --accent: #3b82f6; --border: #27272a; --text-main: #f4f4f5; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); color: var(--text-main); overflow: hidden; letter-spacing: -0.01em; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        .g-table-row td { height: 58px; vertical-align: middle; border-bottom: 1px solid var(--border); }
        .g-input { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-main); padding: 0 12px; border-radius: 8px; font-size: 13px; outline: none; width: 100%; height: 38px; transition: all 0.2s; }
        .g-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1); }
        .sidebar-active { background: rgba(59, 130, 246, 0.1); color: #60a5fa !important; }
        .data-panel { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 24px; overflow: hidden; }
        [x-cloak] { display: none !important; }
        .btn-action { font-size: 11px; padding: 6px 14px; border-radius: 8px; background: #18181b; border: 1px solid #27272a; color: #a1a1aa; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; font-weight: 600; }
        .btn-action:hover { background: #27272a; color: white; }
        .btn-primary { background: #2563eb; color: white; border: none; }
        .btn-primary:hover { background: #3b82f6; }
        .btn-delete:hover { color: #ef4444; }
        .dirty-row { border-left: 3px solid #f59e0b !important; }
    </style>
</head>

<body x-data="editor()" @keydown.window.prevent.ctrl.s="saveDirtyFiles()" class="h-screen flex flex-col">

    <!-- OVERLAY -->
    <div x-show="isSaving" x-cloak class="fixed inset-0 bg-black/80 z-[100] flex flex-col items-center justify-center backdrop-blur-sm">
        <div class="w-10 h-10 border-2 border-white/20 border-t-white rounded-full animate-spin"></div>
        <p class="mt-4 text-[10px] font-bold uppercase tracking-widest text-zinc-400">Processing...</p>
    </div>

    <!-- NAVBAR -->
    <nav class="h-14 border-b border-zinc-800 bg-zinc-950 flex items-center justify-between px-4 z-30">
        <div class="flex items-center gap-4">
            <h1 class="text-xs font-bold uppercase tracking-tighter">Data Maker <span class="text-blue-500 font-black">V2.7</span></h1>
            <button @click="openProject()" class="btn-action !py-1.5"><i class="fa-solid fa-folder-open text-blue-500"></i> Open Project</button>
            <div class="h-4 w-[1px] bg-zinc-800 mx-1"></div>
            <button @click="exportAllData()" class="btn-action !py-1.5"><i class="fa-solid fa-file-export text-orange-400"></i> Export JSON</button>
            <button @click="importData()" class="btn-action !py-1.5"><i class="fa-solid fa-file-import text-green-400"></i> Import Sync</button>
        </div>
        <div class="flex items-center gap-4">
            <input type="text" x-model="searchQuery" placeholder="Search identifiers..." class="g-input !w-64">
            <button @click="saveDirtyFiles()" :disabled="dirtyCount === 0" :class="dirtyCount > 0 ? 'btn-primary' : 'opacity-30 cursor-not-allowed'" class="btn-action px-8 uppercase tracking-widest transition-all">
                Sync (<span x-text="dirtyCount"></span>)
            </button>
        </div>
    </nav>

    <div class="flex-1 flex overflow-hidden">
        <!-- SIDEBAR -->
        <aside class="w-64 bg-zinc-950 flex flex-col border-r border-zinc-900 shrink-0">
            <div class="p-4"><button @click="openCreateModal()" class="btn-action btn-primary w-full justify-center"><i class="fa-solid fa-plus-circle"></i> New Resource</button></div>
            <div class="flex-1 overflow-y-auto custom-scrollbar">
                <template x-for="folder in folders" :key="folder.fullPath">
                    <div @click="activeFolder = folder.fullPath" 
                         :style="'padding-left: ' + (folder.level * 12 + 16) + 'px'" 
                         :class="activeFolder === folder.fullPath ? 'sidebar-active' : 'text-zinc-500 hover:text-zinc-300'" 
                         class="py-2.5 px-3 cursor-pointer text-[13px] font-medium truncate flex items-center gap-2">
                        <i class="fa-solid fa-folder text-[11px] opacity-40"></i> <span x-text="folder.name"></span>
                    </div>
                </template>
            </div>
        </aside>

        <!-- MAIN -->
        <main class="flex-1 bg-zinc-950 overflow-y-auto custom-scrollbar p-6">
            <template x-for="(groupFiles, scriptName) in groupedFiles" :key="scriptName">
                <div class="data-panel">
                    <div class="px-5 py-3 border-b border-zinc-800 bg-zinc-900/20 flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <span class="text-[11px] font-bold uppercase tracking-widest text-zinc-400" x-text="scriptName"></span>
                            <button @click="addNewEntry(groupFiles, scriptName)" class="btn-action !py-1 !px-3"><i class="fa-solid fa-plus text-blue-500"></i> New Entry</button>
                            <template x-if="groupFiles[0].type === 'json'">
                                <button @click="openAddPropModal(groupFiles)" class="btn-action !py-1 !px-3"><i class="fa-solid fa-columns"></i> Add Column</button>
                            </template>
                        </div>
                    </div>

                    <div class="overflow-x-auto custom-scrollbar">
                        <table class="w-full text-left border-separate border-spacing-0">
                            <thead>
                                <tr class="bg-zinc-900/30">
                                    <th class="px-6 py-3 border-b border-zinc-800 text-[10px] font-bold text-zinc-500 uppercase">Identifier</th>
                                    <template x-for="prop in getFieldsForGroup(scriptName, groupFiles)">
                                        <th class="px-4 py-3 border-b border-zinc-800 text-[10px] font-bold text-zinc-600 uppercase" x-text="prop"></th>
                                    </template>
                                    <th class="px-4 py-3 border-b border-zinc-800 w-[60px]"></th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="file in groupFiles" :key="file.id">
                                    <tr class="g-table-row group" :class="file.dirty && 'dirty-row'">
                                        <td class="px-6 min-w-[200px]"><span class="text-[13px] font-semibold text-zinc-300" x-text="file.name"></span></td>
                                        <template x-for="prop in getFieldsForGroup(scriptName, groupFiles)">
                                            <td class="px-2">
                                                <template x-if="typeof file.data[prop] === 'boolean'">
                                                    <button @click="file.data[prop] = !file.data[prop]; markDirty(file)" 
                                                            :class="file.data[prop] ? 'bg-green-600' : 'bg-zinc-800'" class="w-9 h-5 rounded-full px-0.5 flex items-center transition-all">
                                                        <div :class="file.data[prop] ? 'translate-x-4' : 'translate-x-0'" class="w-4 h-4 bg-white rounded-full transition-all"></div>
                                                    </button>
                                                </template>
                                                <template x-if="typeof file.data[prop] !== 'boolean'">
                                                    <input type="text" x-model="file.data[prop]" @input="markDirty(file)" class="g-input">
                                                </template>
                                            </td>
                                        </template>
                                        <td class="px-2 text-center">
                                            <button @click="deleteEntry(file)" class="btn-delete text-zinc-600"><i class="fa-solid fa-trash-can"></i></button>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
            </template>
        </main>
    </div>

    <!-- MODAL: ADD COLUMN (JSON) -->
    <div x-show="addPropModal.open" x-cloak class="fixed inset-0 z-[110] flex items-center justify-center p-6 bg-black/80 backdrop-blur-md">
        <div class="bg-zinc-950 w-full max-w-md rounded-2xl border border-zinc-800 p-6 space-y-4" @click.away="addPropModal.open = false">
            <h3 class="text-zinc-400 font-bold uppercase text-[10px]">Add Column (JSON Only)</h3>
            <input type="text" x-model="addPropModal.name" class="g-input" placeholder="Property Name">
            <select x-model="addPropModal.type" class="g-input">
                <option value="string">String</option>
                <option value="number">Number</option>
                <option value="boolean">Boolean</option>
            </select>
            <input type="text" x-model="addPropModal.defaultValue" class="g-input" placeholder="Default Value">
            <div class="flex justify-end gap-3"><button @click="confirmAddProperty()" class="btn-action btn-primary">Add Column</button></div>
        </div>
    </div>

    <script>
        function editor() {
            return {
                allFiles: [], folders: [], activeFolder: '', searchQuery: '', rootHandle: null,
                dirtyCount: 0, isSaving: false,
                blacklist: ['script', 'uid', 'type', 'format', 'load_steps', 'atlas', 'texture', 'sprite_frames', 'icon'],
                godotTypes: ['ExtResource', 'SubResource', 'Rect2', 'Vector2', 'Vector3', 'Color', 'Transform2D'],
                addPropModal: { open: false, group: null, name: '', type: 'string', defaultValue: '' },
                createModal: { open: false, name: '', ext: '.tres' },

                async openProject() {
                    try {
                        this.rootHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
                        this.allFiles = [];
                        await this.scanDir(this.rootHandle, "");
                        this.buildTree();
                    } catch (e) { }
                },

                async scanDir(handle, path) {
                    for await (const entry of handle.values()) {
                        const curPath = path + entry.name;
                        if (entry.kind === 'directory') await this.scanDir(entry, curPath + "/");
                        else {
                            const file = await entry.getFile();
                            const content = await file.text();
                            if (entry.name.endsWith('.tres')) {
                                const { header, body } = this.splitTres(content);
                                this.allFiles.push({ id: curPath, name: entry.name, path: curPath, folder: path.replace(/\/$/, "") || "root", handle: entry, data: this.parseTresBody(body), type: 'tres', scriptName: "Godot Resource", dirty: false, rawHeader: header });
                            } else if (entry.name.endsWith('.json')) {
                                try {
                                    const json = JSON.parse(content);
                                    for (let [id, val] of Object.entries(json)) {
                                        this.allFiles.push({ id: curPath + ":" + id, name: id, path: curPath, folder: path.replace(/\/$/, "") || "root", handle: entry, data: val, type: 'json', scriptName: entry.name, dirty: false });
                                    }
                                } catch (e) {}
                            }
                        }
                    }
                },

                splitTres(content) {
                    const marker = "[resource]";
                    const index = content.indexOf(marker);
                    if (index === -1) return { header: content, body: "" };
                    return { header: content.substring(0, index + marker.length), body: content.substring(index + marker.length) };
                },

                parseTresBody(bodyText) {
                    const data = {};
                    bodyText.split(/\r?\n/).forEach(line => {
                        const t = line.trim();
                        if (t && t.includes('=') && !t.startsWith('[')) {
                            const [k, ...v] = t.split('=');
                            const key = k.trim();
                            let val = v.join('=').trim();
                            if (val.startsWith('"') && val.endsWith('"')) val = val.substring(1, val.length - 1);
                            else if (val === "true") val = true;
                            else if (val === "false") val = false;
                            else if (!isNaN(val) && val !== "") val = Number(val);
                            data[key] = val;
                        }
                    });
                    return data;
                },

                isProtected(key, value) {
                    if (this.blacklist.includes(key.toLowerCase())) return true;
                    if (typeof value === 'string') {
                        return this.godotTypes.some(type => value.startsWith(type + "("));
                    }
                    return false;
                },

                getFieldsForGroup(script, files) {
                    let keys = new Set();
                    files.forEach(f => {
                        Object.entries(f.data).forEach(([k, v]) => { // Fixed syntax here
                            if (!this.isProtected(k, v)) keys.add(k);
                        });
                    });
                    return Array.from(keys);
                },

                async saveDirtyFiles() {
                    if (this.dirtyCount === 0) return;
                    this.isSaving = true;
                    try {
                        const paths = [...new Set(this.allFiles.filter(f => f.dirty).map(f => f.path))];
                        for (let p of paths) {
                            const entries = this.allFiles.filter(f => f.path === p);
                            const first = entries[0];
                            const w = await first.handle.createWritable();
                            if (first.type === 'tres') {
                                let content = first.rawHeader + "\n";
                                for (const [k, v] of Object.entries(first.data)) {
                                    let valStr = v;
                                    if (typeof v === 'string') {
                                        const isNative = this.godotTypes.some(type => v.startsWith(type + "("));
                                        if (!isNative) valStr = `"${v}"`;
                                    }
                                    content += `${k} = ${valStr}\n`;
                                }
                                await w.write(content);
                            } else {
                                const json = {};
                                entries.forEach(e => json[e.name] = e.data);
                                await w.write(JSON.stringify(json, null, "\t"));
                            }
                            await w.close();
                            entries.forEach(e => e.dirty = false);
                        }
                        this.dirtyCount = 0;
                    } catch (e) { alert(e.message); }
                    finally { this.isSaving = false; }
                },

                async importData() {
                    if (this.allFiles.length === 0) return;
                    const input = document.createElement('input');
                    input.type = 'file'; input.accept = '.json';
                    input.onchange = async (e) => {
                        const file = e.target.files[0];
                        if (!file) return;
                        try {
                            const imported = JSON.parse(await file.text());
                            const fileMap = new Map();
                            this.allFiles.forEach(f => { fileMap.set(f.id, f); fileMap.set(f.name, f); });
                            let changedCount = 0;
                            for (const [key, newValObj] of Object.entries(imported)) {
                                const target = fileMap.get(key);
                                if (target) {
                                    let localChanged = false;
                                    for (const p in newValObj) {
                                        if (!this.isProtected(p, target.data[p])) {
                                            if (JSON.stringify(target.data[p]) !== JSON.stringify(newValObj[p])) {
                                                target.data[p] = newValObj[p];
                                                localChanged = true;
                                            }
                                        }
                                    }
                                    if (localChanged) { this.markDirty(target); changedCount++; }
                                }
                            }
                            alert(`Sync: ${changedCount} items updated.`);
                        } catch (e) { alert("Invalid JSON!"); }
                    };
                    input.click();
                },

                exportAllData() {
                    const bundle = {};
                    this.allFiles.forEach(f => {
                        const cleanData = {};
                        for (const [k, v] of Object.entries(f.data)) {
                            if (!this.isProtected(k, v)) cleanData[k] = v;
                        }
                        bundle[f.id] = cleanData;
                    });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(new Blob([JSON.stringify(bundle, null, 2)], {type:'application/json'}));
                    a.download = `db_bundle.json`;
                    a.click();
                },

                buildTree() {
                    const paths = [...new Set(this.allFiles.map(f => f.folder))];
                    this.folders = paths.sort().map(p => ({ name: p === "root" ? 'Root' : p.split('/').pop(), fullPath: p, level: p === "root" ? 0 : p.split('/').length }));
                    this.activeFolder = this.folders[0]?.fullPath || '';
                },

                get groupedFiles() {
                    let f = this.searchQuery ? this.allFiles.filter(f => f.name.toLowerCase().includes(this.searchQuery.toLowerCase())) : this.allFiles.filter(f => f.folder === this.activeFolder);
                    const groups = {};
                    f.forEach(x => { if (!groups[x.scriptName]) groups[x.scriptName] = []; groups[x.scriptName].push(x); });
                    return groups;
                },

                markDirty(f) { if (!f.dirty) { f.dirty = true; this.dirtyCount++; } },

                async deleteEntry(file) {
                    if (!confirm("Delete this?")) return;
                    if (file.type === 'tres') { await file.handle.remove(); this.allFiles = this.allFiles.filter(f => f.id !== file.id); }
                    else { 
                        const p = file.path; this.allFiles = this.allFiles.filter(f => f.id !== file.id);
                        this.allFiles.filter(f => f.path === p).forEach(f => this.markDirty(f));
                        if (this.allFiles.filter(f => f.path === p).length === 0) this.dirtyCount++;
                    }
                    this.buildTree();
                },

                addNewEntry(group, scriptName) {
                    const first = group[0];
                    if (first.type === 'json') {
                        const id = prompt("New Entry ID:");
                        if (!id) return;
                        this.allFiles.push({ ...first, id: first.path + ":" + id, name: id, data: JSON.parse(JSON.stringify(first.data)), dirty: true });
                        this.dirtyCount++;
                    } else {
                        const name = prompt("Filename:");
                        if (name) this.internalCreate(name, '.tres');
                    }
                },

                openAddPropModal(g) { this.addPropModal = { open: true, group: g, name: '', type: 'string', defaultValue: '' }; },
                confirmAddProperty() {
                    const { name, type, defaultValue, group } = this.addPropModal;
                    let val = type === 'number' ? Number(defaultValue) : (type === 'boolean' ? (defaultValue === 'true') : String(defaultValue));
                    group.forEach(f => { if (!(name in f.data)) { f.data[name] = val; this.markDirty(f); } });
                    this.addPropModal.open = false;
                },

                openCreateModal() { this.createModal = { open: true, name: '', ext: '.tres' }; },
                async confirmCreateFile() {
                    if (this.createModal.name) await this.internalCreate(this.createModal.name, this.createModal.ext);
                    this.createModal.open = false;
                },

                async internalCreate(name, ext) {
                    const fullName = name + ext;
                    let dir = this.rootHandle;
                    if (this.activeFolder !== "root") for (let p of this.activeFolder.split('/')) dir = await dir.getDirectoryHandle(p);
                    const handle = await dir.getFileHandle(fullName, { create: true });
                    const path = (this.activeFolder === "root" ? "" : this.activeFolder + "/") + fullName;
                    this.allFiles.push({ id: path, name: fullName, path, folder: this.activeFolder, handle, data: {}, type: ext.replace('.',''), scriptName: ext === '.tres' ? "Godot Resource" : fullName, dirty: true, rawHeader: `[gd_resource type="Resource" format=3]\n\n[resource]` });
                    this.dirtyCount++;
                }
            }
        }
    </script>
</body>
</html>
